body:
  text: 周易新講義卷四宋耿南仲撰震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復之為卦以六爻言之與姤反者也以二體言之與豫反者也雷在地中為復雷出地奮為豫豫者衆人熙熙如春臺之時方是時疑若亨也而其究則為塞所謂伸道致屈也復者歸根復命之時疑若塞也而其究則為亨所謂屈道致伸也故曰復亨而豫則不言亨焉剛反動而以順行言循乎自然之機而無所拂也夫惟若是故出無疾言自外來而無疾也入無疾言自內往而無疾也謂利用出入無有括礙之也復非獨陽復而隂亦復其所故曰朋來言隂之朋來也隂反其所非出而干陽故陽得無疾陽反其所不致阻隂故得無咎未至為反已至為復反復其道七日來復此天行也聖人之於卦於臨必曰八月有凶於復必曰七日來復何也非獨於復原始而臨要終也道之消長有數存焉於其間知此則道之消也不足憂道之長也不足喜其出不利而其入不懼矣剝之不利有攸往則稱小人壯復之利有攸往則稱小人消剝不利有攸往則稱小人長復之利有攸往則稱剛長何謂也言小人則如戒之君子言剛知小人之為柔然而剛柔云者天地之道也君子小人云者人事也天地之道屈伸相感利在其中雖五隂長而為剝是猶日往而月來暑往而寒來非不利也其有不利則人事而已故於其不利有攸往則以人事言於其利有攸往以天地之道言之也復之見天地之心何也其往其復皆足以見天地之心而於復言此何也復者一陽始生正北方也北方水也於情為恐而南方火也於情為喜往而喜復而恐物之情也於物之為恐且順之焉則其見天地之心莫此為著矣象曰雷在地中復先王以至日閉關商旅不行后不省方復者隂陽各復其所故先王以閉關商旅不行以應隂之復也后不省方以應陽之委也故省方觀民則稱先王於不省方則稱后后與有司反者也有司則勞而后則逸於其有不省方也稱后宜矣初九不逺復無祗悔元吉象曰不逺之復以修身也天地之道一往一復則人亦不能無往復也然往則離本復則反本是以復之為貴而尤貴其復之早也初九復之早者故曰不逺復然而聖人之為道復非修身往非殉物與時偕行而已矣初九雖復之不逺然克己而復非所謂與時偕行者也故於地道則無悔焉於知幾之神則不為無小疵矣故曰無祗悔元吉六二休復吉象曰休復之吉以下仁也依於仁為休六二依初九之仁而下焉復之休者也夫仁天之尊爵也不可不下也六三頻復厲無咎象曰頻復之厲義無咎也六三既復而過中矣於是時將以自克而求復則是失之於嬉逰之日而事之於奔競之時也彼又烏能無頻乎哉且火於情為喜水於情為恐則火馳而喜淵靜而恐復之情也則六三之頻宜雖然危道也雖危而無咎者以其猶復義無咎也六四中行獨復象曰中行獨復以從道也六四居四隂之中而能復此不與天下皆往而能獨復者也萬物並作吾以觀其復之謂也象謂之從道從道於初九也六二謂之下仁六四謂之從道蓋初九不逺之復以修身也修身以道修道以仁能修身則道與仁具矣以六二之親也則曰下仁以六四之逺也則曰從道各從其類也六五敦復無悔象曰敦復無悔中以自考也六五居大中之位非失其所受於天地者也非失其所受於天地而復焉則是消息盈虛與時偕復而已矣是乃所以為敦復也夫早復謂之重積德重積德則固乃厚矣消息盈虛與復則又厚之至也故稱敦焉敦復則出吉凶之表而萬變不能為之疵非獨無祗悔而已象曰中以自考何謂也言能自考則非資於人若下仁從道者也又非克己若修身者也成乎自然而已是乃所以為敦也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也復貴早者也迷而後復其凶必矣天曰災人曰眚迷而后復違天人之道故曰有災眚以此行師是謂窮兵兵猶火也弗戢將自焚也故用行師終有大敗行師而以其國君主之則事之尤大者不可甚矣至於十年不克征以其迷也故如此其久也猶知復焉過十年則克征矣夫冕之制後昂而前俯衣亦上玄而下纁蓋所貴在此不在彼也今迷而后復則反君道也故曰迷復之凶反君道也震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉序卦曰復則不妄蓋誘于物而自內出則賓以從物無往而不妄遺物而自外來則有主于中而性之貴得矣故無妄之成卦在剛自外來而為主於內也剛自外來而為主既不妄矣是故動而健何則乘流而下者易以至背風而馳者易以逺今因性循理而不妄是亦乘流而下背風而馳之類也其勢可勝禦哉既動而健矣又九五之才剛中而應夫剛不及中則易入為邪剛過中則謂誠者所居以類至也夫如是則大亨以正矣其畜諸中也剛自外來而為主于內其發于外也動而健其在天下皆有應無違則雷之發于地中而行天下以動化萬物不過如此然則剛自外來而為主于內動而健剛中而應以致大亨以正是天命非人為也其匪正有眚何也目之虛也不能受播粳之眯耳之虛也不能受聚蚊之蚋凡以至理之中不受外也今以匪正而容乎無咎之間是播粳聚蚊之説也故其匪正有眚且無妄之世雖以無妄行者猶有疑於其妄而或係之況以匪正行者乎故曰不利有攸往象曰無妄之往何之矣天命不祐行矣哉象曰天下雷行物與無妄先王以茂對時育萬物雷在地中以至地奮而行天下皆有節焉未嘗妄也惟未嘗妄故能感物而物應之物之所以感以乘理應時而不能違也雷之動息以時故物以時應而不能違然則先王又烏能違時而求物之裕若揠苗者哉於是先王以茂對時育萬物謂之茂對則以四時之中其氣機蒸濡而不測之變不與焉則論其育之之法不為不茂矣初九無妄往吉象曰無妄之往得志也雜卦曰震起也艮止也艮陽在上為得其所故止震陽在下未得其所而止未得其所而起此理之常也則初九以剛在下而往亦理之常豈曰妄哉故曰無妄往吉也六二不耕穫不災畬則利有攸往象曰不耕穫未富也唱者君之分隨者臣之分六二執柔處中隨而不唱得臣之分者故為不耕穫不災畬不耕而穫言終其功也不災而畬言因其業也六二體震之性志于往而近妄者也惟不耕而穫不災而畬然后利有攸往言其動如此不為妄也六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也以柔應剛其志不妄者也而九四以剛阻其前無妄之災也匪正則稱眚言人自為之也無妄則稱災言天實為之也柔之為物順者也為順故物或之然言三之得九四之災也蓋六三之行不妄九四疑而係之乃所以為無妄故曰行人之得邑人災也九四可貞無咎象曰可貞無咎固有之也其才其位適當而不偏勝乃所謂正也不得不正則才勝于位猶之可也位勝其才則不可九四才勝其位者也故曰可正而無咎者為其足以固其位與折足覆餗者異矣九五無妄之疾勿藥有喜象曰無妄之藥不可試也易乘則為疾然九五剛健中正位乎天德與豫六五異矣則其為疾可勿藥也勿藥則有喜蓋以謂蔽之所以為妄譬諸飲藥以加疾也非妄也疑其為妄而係之以非疾也疑于為疾而藥之妄也夫衆有之藝藝迷者以為貞也悟者以為妄也以為貞者固非以為妄者亦未是也老氏曰滌際元覽至理則無一疵矣若觀一疵而攻之則是妄上九無妄行有眚無攸利象曰無妄之行窮之災也在下而未得其所則動在上而已得其所則止此理之常也今上九懼乾而猶上行是不知常而妄作者也宜其有眚而無攸利也乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜畜賢之卦也能畜德然後畜賢故先曰剛健篤實輝光日新其德言畜德也次曰剛上而尚賢能止健大正言畜賢也人之生也自其赤子含德已厚矣惟柔而不能有己也順而不違物也故萬物之來得以搖動而攓取之於是向之所畜蕩然一散空空如也聖人不然立其大者以剛健惟剛健故能積而篤實其發外而為光輝而其為光輝非若火然薪盡而滅也足以日新其德矣日新其德故德日新德已新者德成之終也日新其德者畜德之始也畜德至于輝光日新其德則賢者能者瞿瞿而向之若輝之類明大矣於是可以尚賢而止健也謂之剛上者上九之謂也育賢宜以柔畜賢宜以剛也尚賢故賢者在位止健故能者在職尚賢止健大者之正也賢者能者有養之道故詩以況嘉魚甘瓠焉誠能尚賢使能則天下不待家食而人被其養矣故曰不家食吉養賢也夫涉險犯難莫利乎能在職衆助莫盛乎此故有利涉大川然則曰應乎天何也得人則得天且既賚以涉難之良弼矣內之扶之涉難所以應天也象曰天在山中大畜君子以多識前言往行以畜其德聖人之畜德也求諸已所謂剛健篤實輝光日新其德是也君子之畜德也資乎人所謂多識前言往行是也有德必有言然則前言德在中矣君子成德為行然則往行德在中矣故君子之畜德莫良乎前言往行也然而前言悉皆德言也往行未必皆德行也在夫多見而識之識之則不逆于所聞矣初九有厲利己象曰有厲利己不犯災也大畜之時賢者在所尚健者在所止三陽以健進皆在所止而初九尤其健之始也凡事于其正始則常嚴故初九有厲利己然後不犯災所謂己者謹其分守而不敢進越之謂也九二輿説輹象曰輿説輹中無尤也大有以柔有也故九二大車以載有攸往無咎大畜以剛畜也故九二輿説輹為臣之道欲方以載其上圓以行乎下故當取象于車焉大畜之時方且正君臣之分取載其上而已無事乎圓以行于下也故稱輿焉輿之所脫輹以分守之至嚴未可越而進也九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也畜至于九三則君臣之際志交而情通畜道于是亨矣故曰良馬逐言三陽之並進也方輿脫輹則知艱及良馬逐則易之人情之常也天不假易故曰利艱貞又當戒習所以載其上而衛其亨之事故曰間衛夫方以載上之義於其脫輹之時固不廢矣衛其身之智於其利已之時固不廢矣非至良馬逐而始為之也至是又習復而已語曰學而時習之由始而習之于復也夫利其身而忘其君不若利其君而忘其身利其君而忘其身又不若方以載乎君而周衛其身之為兼得也故稱輿衛焉如是然後利有攸往一有偏廢則有攸往不利也六四童牛之牿元吉象曰六四元吉有喜也下卦受畜者也上卦皆畜其下者也雖六四之柔亦足以畜其下者有分義故也童牛私欲不行而順者牿角械也牛雖順物其角猶剛今且牿之則剛又不用矣此順之至也燮友柔克此之謂也六五豶豕之牙吉象曰六五之吉有慶也豶豕不純乎陽矣其能制物而物不敢犯者以有牙也所謂平康正直者也六四六五皆取其私欲不行然後能畜德既厚者何也惟私欲不行然後能畜既德厚則無所事剛而不犯所以取象如此也六四有喜而已六五有慶則四方來賀之謂也上九何天之衢亨象曰何天之衢道大行也天衢賢者之所由以天上達者也畜道成則天衢以亨焉大畜者君臣相遇之時君臣相遇而畜道大成然後能使天衢亨則賢才無不違矣所以致此則上九之福故曰何天之衢亨也震下艮上頥貞吉觀頥自求口實象曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉頥之成卦上止而下動其中虛焉頥之象也草木之養枝葉者在其本人之養百體者在其頥故頥養也所養正則擴而充之無往而不正矣所養邪則擴而充之無不為邪故養正則吉也自養者也然後可以觀人之所養與其自養蓋取人必以身故也人之所養有賢否所養正則人賢可知矣所謂不知其君視其臣是也人之自養有邪正自養正則施于人可知矣所謂察其所安人焉廋哉是也夫子以寡欲養心以直養氣其自養亦大矣不觀其養氣與心之大而觀其自求口實何也人之所以忘其大體善以從事于口體之養口體求不失義則其大體可知矣是以觀其自求口實則足以知其自養也其曰自求何謂也蓋有與人求者如冉子為子華請粟之類是也為人求則雖請益而無嫌而使自求如是則汚矣故觀人之廉貪必以觀其自求口實也君子自養斯可矣必觀人之所養與自養何也蓋養道貴充者也養既貴充則一身之肥不如天下之肥為充之至也欲天下之肥勢不能人人食之則必本乎養賢而養賢以知人為始是以必觀人之所養與自養然後知賢而養賢以及萬民也天地在六子以養萬物聖人養賢以及萬民外天地無為也無為者不嫌于自在故不言六子而直曰養萬物聖人有為也有為者嫌于自用故養賢以及萬民焉飬賢以及萬民而致天下之肥非大人不足以與此故頥之時大矣哉象曰山下有雷頥君子以慎言語節飲食山也者附萬物之成形于外者也雷也者作萬物之生氣于內者也所以養物二者為盛有頥之義焉言語不慎則招外患飲食不節則起內患所以自養也言語之不輕也如山飲食之有節也如雷視其後者而鞭之則自養之道盡矣初九舍爾靈龜觀我朵頥凶象曰觀我朵頥亦不足貴也初九以剛明之才而在沉潛之地靈龜之象也君自養如靈龜則足矣故莊子有曳尾於塗中之辭焉初九不善自養乃躁動而求養于人故曰舍爾靈龜觀我朵頥夫靈龜善潛而不志于義乃躁動而求養于人朵頥而食斯賤矣有靈龜之德則求口實無嫌也舍靈龜之德而觀朵頥則不可也舍己之靈龜而曰爾觀人之朵頥而曰我蓋不知物我之辨有如此也六二顛頥拂經于丘頥征凶象曰六二征凶行失類也以上養下謂之顛頥六二之養初九頥顛也然二猶未離乎下體也未離乎下體而養下則亂頥之經矣蓋在上者養在下者受養于上此頥之經故也山善養物者也丘雖不足于山之德然亦不待下之養六五養道之不足者也而往養焉則是于丘頥者于頥則征而凶矣蓋六五從上九之養不待六二也如人君而受教者也自有師傅與左右輔弼之臣彼踈逖小臣惟祇若王明而已亦欲有教焉則失類而凶矣失類而凶言不足以得友也六三拂頥貞凶十年勿用無攸利象曰十年勿用道大悖也民不正不能以自養也又由上九以養不能有所養也則順之道喪矣不止失上下之經而已故曰拂頥拂頥凶可知矣觀其自養則不正觀其所養又無有以資養于人也則又何有足用之時故曰十年勿用而無攸利所以過十年而用者以其知變而上有應故也六四顛頥吉虎視耽耽其欲逐逐無咎象曰顛頥之吉上施光也自養正然後有所養六二六四皆自養焉能有所養者也然六二未離乎下而六四則在上矣故六二不如六四顛頥而吉也大扺自養正則於朵頥不觀其自視正矣自視正故視則有威如虎之耽耽然也其欲逐逐言不充其欲者也虎亦食物者也今曰其欲逐逐則是有虎視威而元虎之貪也夫自覽英華于外而懷歆羡之心則徇物而喪矣今其視耽耽目不榮于紛華其欲逐逐心不主于歆羡自養如此宜無咎矣六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也在上宜能養下者也隂道常乏不能有所養而從上九之養拂乎經矣六二六五皆拂經而無凶何也君子所貴自養而已自養者正中雖不能有所養於所養之經拂未有害也是以不言凶咎也惟有所養則輔之者衆然後可動今不能有所養則不可以動是以利居而不可以涉大川也上九由頥厲吉利涉大川象曰由頥厲吉大有慶也由頥六五以下皆由我養也以道養天下乃居尊位大中者之事而以上九為之則厲矣其所以吉者澤被生民故也此周公之事也由頥則得衆助故利涉大川與六五異矣巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉衆足以過寡得位足以勝失位得道足以勝失道四陽衆矣又得位中則大者過矣故為大過雖然大者過則必有為非常之事以立非常之功豈聖人之心也哉特以棟橈而已且負衆榱以庇下者棟也今本末皆弱其為棟也橈則所以庇者將傾大者安得不過哉然過而不剛則無獨立不懼之勇過而不中則有過涉滅頂之害故曰剛過而中而又內伏行以巽而藏用外見以説而顯諸仁如此則利有攸往利有攸往則藏弱者扶衰者拯而棟復隆矣是以亨也大過之時非大者不足以有為也故曰大過之時大矣哉象曰澤滅木大過君子以獨立不懼遁世無悶獨立不懼遁世無悶二者皆君子之所以大過人者也夫上有棟橈之勢未易救也前有滅頂之害未易往也君子乃獨立不懼所以大過人者也棟之橈也民將失其庇焉棟可隆也君子不得有為于遁世焉是則可悶也乃謷然而不悶是亦所以大過人者也初六藉用白茅無咎象曰藉用白茅柔在下也天下之勢有可以為有不可以為者君子亦末如之何矣所謂木顛於一繩所維是也其可以為者又須所處之地所資之才兼得而後可上六之才不足者也初六則位不足也君子進而有為則可使棟橈成強直之勢退而無為則若白茅之無咎當澤滅木之世得平地以自措則斯安矣又藉之以柔何咎之有九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也大過之象或為枯楊或為棟橈橈則易拯枯楊則難生易棟橈而成棟隆者人事也枯楊之生稊天理也才有餘則雖天理之難致者可以為其才否則雖人事之易拯者猶無補也是以其象不同也稊者楊秀者也弱不能遽強蓋有漸焉故有生稊之象其所以生稊以九二剛過而中故也故九二之遇初六老夫女妻之象也過以相與而不相陵是以無不利如女承筐無實士刲羊無血若是則無攸利矣九三棟橈凶象曰棟橈之凶不可以有輔也大過之世剛過而中然後足以輔世而成棟橈之功九三不能過小者而又不中則不足以輔世故棟橈凶則傾矣九四棟隆吉有它吝象曰棟隆之吉不橈乎下也大過之所以亨以剛過而中也然與其不過寧若不中九三九四皆不中者也九三不過故棟橈九四剛過故棟隆九四雖不足以為亨而有吝然與九三異矣四猶應初疑於有它志在大過不牽于小者則不橈乎下矣九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也生稊則長為條肄而終成壯實之才矣生華則為一時之觀美而不可以久者也九五剛中故于衰弱之世能有所生然而不過則所生者華而已矣上六之視九五老婦士夫之象也夫士夫之醜則中制也老夫女妻於制為反矣是則可醜也剛中有可制之資是以無咎然所生不可不久也而其配亦可醜也則亦安能有譽哉上六過涉滅頂凶無咎象曰過涉之凶不可咎也滅木之澤瀰漫甚矣而過涉焉至于滅頂則又可知矣夫不剛則無可涉之才不中則無知節之德徒任智而往不量其力又奚可哉然雖志在濟時非喜功也殺身成仁何可咎也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉離麗也以隂言也而重明者以陽言也坎陷以陽言也而重險者以隂言也上而重險陽在其中動而不能出水流而不盈之象也盈而不溢則不能出險矣雖不能出險而其歸必中其趨必下則足以行險而不失其信也二五以剛居中維心亨者也夫居重險之中動則括往則礙其道不可謂亨也維心亨而已夫茅塞其心則自困者也非以處險也困于心衡于慮則以處險也非自困者也然處險難之中遂困心而衡慮則亦內之未明而已若清在中則雖遇險難其心常亨何困心衡慮之有哉以在險中故往則有尚行則出險故也故誕先登于岸言安身而後動也行而出險先登于岸然後可以有為而建功故曰行有尚往有功也聖人雖求出險未嘗不設險非如小人之陷物也天地之理然也不可升者天險也山川丘陵者地險也則王公安得無險哉且貴者人之所妬富者人之所爭今處王公之貴而有土地之富則是居人之所妬聚人之所爭不可不設險以自固也阻法度之威使人不得而踰焉此天險也髙城深塹此地險也然是險也守之以道則易以興守不以道則易以亡善用險而興者其為大人乎象曰水洊至習坎君子以常德行習教事行險者武事也所謂事者蓋武事也不教民戰是謂棄之故稱武事焉詩曰有常德以立武事先常德而後立武蓋不如是則有因怒興事踊躍用兵者矣初六習坎入于坎窞凶象曰習坎入坎失道凶也君子亦有時而居險然不終為險所陷也其卒動而免乎險矣王公亦有時而設險然不終以險自恃也其卒易而無備矣初六習坎入坎則是居險而終陷設險而終恃也凶可知矣闕為其鑿也荀子曰元師無法而智則必為盜矣智者君子之所貴也而有至于鑿甚有至于為盜者以不麗乎正故也重明以麗乎正則若禹之行水因性循理而無察察之政焉乃所以化成天下也中正者剛柔之節也剛巽乎中正而志行剛得其節也柔麗乎中正故亨柔得其節也柔得中正之節故畜牝牛吉焉夫牝牛順之至也所養以至順而不本乎中正則入于邪未見其吉也象曰明兩作離大人以繼明照于四方日月兩作而繼照大人與日月合其明故能以繼明照于四方堯舜之重華文武之重光則其事也初九履錯然敬之無咎象曰履錯之敬以辟咎也六二以柔履下之象也文明在中履之錯然者也人以柔中為德而其接物又有錯然之文此人之所以共敬之也人共敬之而已獨犯焉則咎斯至矣初體炎上之性戒在犯二能敬而不犯則咎可無矣故元咎六二黃離元吉象曰黃離元吉得中道也賢者過之不肖者不及知者過之愚者不及其失道均也由能勇而不能怯賢者過之也賜能辨而不能訥智者過之也六二有柔嘉之德文明之才賢且智矣而能守中黃離之象也書曰節性惟日其邁六二可謂知節性矣其吉不亦宜乎九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也日中必昃理之必然者也君子與時消息則不以息而喜不以消而憂故曰日昃之離不鼓缶而歌與時消也必曰鼓缶者為其能與時消息則為圓虛以應故也苟固其位而不知鼓缶而歌則日方中昃之時未至于老而惟憂用老矣是以大耋興嗟而凶也傳曰物壯則老是謂非道非道于己苟知樂道則安有大耊之嗟哉九四突如其來如焚如死如棄如象曰突如其來如無所容也夫德盛者其體尊位髙者其勢利非物之所能犯也犯之則如觸石按角而退且傷矣六二在下猶當敬之而不可犯又况六五得尊位大中者其不可犯甚矣而九四體炎上之性突如犯之犯之則其勢不能克則退反矣故曰突如其來如夫無禮于君天下所為共疾也既困而來乘九三之剛則宜其焚如以至于死且棄而不收矣六五出涕沱若戚嗟若吉象曰六五之吉離王公也六五以柔居中而四犯之力不足以折衝暴故出涕沱若戚嗟若也出涕沱若憂見于容也戚嗟若憂見于聲也六五離王公之位人之愛戴惟舊而至誠之憂見于聲容足以感人心而天下罔不為用矣是以突如者終不能犯而吉也如其失位號令不行于衆則雖憂而不免故六五之吉離王公也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也日月麗乎天百穀草木麗乎土羣黎百姓麗于王有王德宜天下之所麗而人有不麗者此用出征之時也故於説之道有不盡焉是以觀其所感則闕天也萬物之情灼然可見矣屈伸相感而利害生焉此天地之情也情偽相感而利害生焉此萬物之情也象曰山上有澤咸君子以虛受人山澤者通氣之物也山上有澤則是其氣交也故其象為咸夫山有聳上之成形澤有鍾下之定位而能相感者以其有所謂虛而已故君子以虛受人則如橐之應氣入則鳴不入則止矣其曰受人者以其受于此而已則止而説之之意也初六咸其拇象曰咸其拇志在外也拇在上而無能為者也有之可以為完無之未有害于行者也其才如此而悔吝不至者以在下非任責之地故也六二咸其腓凶居吉象曰雖凶居吉順不害也六二居下體之中動而隨上者也夫隂陽合德燥濕相蒸無根而芝菌生不班而蠐螬育是也化自生無或使之是以咸之所以貴止而説也今六二動以隨上義與咸反凶可知矣然六二守靜處中能居者也居則順于理不害矣九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也股在下體之上隨上以動者也然則股之視腓亦不處者也然六二不處而隨知變而無所執也九三則過中而之外執其隨而不變者也執其隨以動説為道正與咸反是以往吝也以六二居吉則九三往吝可知矣感之者為主應之者為隨今執其隨則所執者下也執下而無害唯初六可也九三既居下體之上而過中矣吝不亦宜乎九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也夫情偽相感也以情感則生利以偽感則生害九四之與初六不失正應則非以偽相感也是以未感害也九四不固其位而兑體悅物之性則其在二陽之間不能自主故憧憧往必來也九三九五皆非其應往不可以得五來不可以得三所以憧憧乎其間耳咸以止而説為善憧憧往來則豈光大之道哉雖憧憧往來無有一得然其感物而來應之心可謂至矣是亦初六之朋從爾思而已聖人感人心而天下和平豈朋從爾思哉九五咸其脢無悔象曰咸其脢志末也脢在心之上口之下其感物之不以心又不以言也夫有心則其感物也狹有言則其感物也狹外守中正之德無言思之纍如天地之感乎萬物死生出乎自然何悔之有哉其曰志末為其於物無擇也使知其大小本末而擇則有心矣上六咸其輔頰舌象曰咸其輔頰舌滕口説也此感物之以言也夫莫嚴乎上令有時乎不從者人心之不可以令服也莫巧乎説辭説辭有時乎不入者物理不可以辭奪也上令猶有不從巧辭猶有不入又况乎譊譊者乎言之不可用以感物也如此則上六咸其輔頰舌但騰口説而已巽下震上恆亨無咎利貞利有攸往彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣剛上而柔下雷風相與巽而動剛柔皆應此恆之所以為常也夫柔上而剛下雷風相薄剛以動而柔之不應是有時而然也非常也蓋剛上柔下而位定剛柔相與而氣通巽而動則理順剛柔皆應則情和所以能久也夫物不可以久居其所則當未為無咎惟久於其道是以亨無咎而利正也天地之道常久而不已者也所以常久而不已非一定而不變之謂也亦運動變化終則有始而已故曰利有攸往終則有始也夫日月得天能久照四時變化能久成聖人久於其道亦若此而已故體道之經猶日月也應世之權猶四時也是以久於其道而天下化成矣且鐫金礱石久而後成固其所也天地萬物之情所久不同天地長久而不已萬物盛衰之不窮而萬物之小年大年各安其分而不相參又有所久中者有久非其位者其不同如此故曰觀其所常而天地萬物之情可見矣象曰雷風恆君子以立不易方惟道為無方於德則有方故傳或稱仁方或稱義方焉立其仁義之方而或易則必一出一入塗巷之人也安可以為常聖人不然體日月之運行四時之變化則方圓無常以和為量矣是以又惡其執方也初六浚恆貞凶無攸利象曰浚恆之凶始求深也古者君臣朋友之際未嘗不相求以竭誠盡節至有相要以死者然則求人非不可以深也惟情意之未通恩信之未結而遽求焉則人之所不堪也初六之求深矣在於此是以貞凶無攸利也九二悔亡象曰九二悔亡能久中也君子亦有時而過亦有時而不及所以應變則然也其卒歸宿之地則中而已則是中者可久之地也二能久中得其所久其悔亡也九三不恆其德或承之羞貞吝象曰不恆其德無所容也常其德則其守道也固其進道也篤彼不常之人其有聞也若存若亡其有行也一出一入雖得之必失之矣夫衣服不二從容有常則為萬民之望既不常其德則萬民何望焉承之者羞理亦宜也近而承之者羞則逺者無不棄故曰無所容也九四田無禽象曰久非其位安得禽也田者興事之大者也禽可獲之物也大事興而不得可獲之物以久非其位故也君子安其身而後動是以動而有獲矣久非其位則身且危而不安何從而得禽哉六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也孔子曰善人吾不得而見之矣得見有恆者斯可矣然則有常者蓋善人之次也其視君子與聖人蓋逺矣聖人地而惟常是人則以之言夫子則以之分有宜不上六振恆凶象曰振恆在上大無功也物不可以終止故既濟終上則其闕振常凶夫動惟厥時乃有功振以周易新講義卷四
