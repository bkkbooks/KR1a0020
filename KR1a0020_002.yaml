body:
  text: 周易新講義卷二宋耿南仲撰震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧觧之初六曰剛柔之際義无咎也剛上而柔下各正其分以禮際之焉故无咎也屯之下體震而震則柔上而剛下既非感應以相與之道又坎在始交而難生是乃所以為屯也然有必觧之道故序卦曰屯者物之始生也物之始生雖屯終必條逹而極於高大是以知屯有必觧之道也屯有必觧之道故聖人動乎險中而有為焉聖人以拯患濟難之才而乘必觧之𫝑則天下之險迎刄而觧矣所以大亨貞也雷雨之動滿盈言所以勿用往之意也以為雷雨之動既以滿盈則將溢而動矣勿用有攸往可也盖震為决躁之性而在乎險中則疑若犯險而有行故有勿用往之戒焉然勿用往豈无為哉造始而已天之造始草而未齊昧而未明若夫使萬事整治而不草群情昭著而不昧則宜建侯而不寧焉建侯雖臣也然其勞臣民有君道焉則是有為而亦有所謂旡為也雖有為而亦有所謂无為者盖屯之義以天地則雷雨之動以萬物則物之始生雷雨自然之動特可化之而已萬物自然之生特可輔之而已不可一於有為以拂乎自然之宜也故雖有所建而所建亦有无為之君道也象曰雲雷屯君子以經綸經綸者盖若治絲然分而理之則治繚而棼之則亂君子之有為於此以成觧也豈有他哉因其固然技經肯綮之未嘗而天下之難自劃然而已觧矣此經綸之意也初九盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也以卦言之則初九以震在下故動而未進有盤桓之象以義言之則聖人廹而後動不得已而後起故稱盤桓焉天地之觧萬物也以雷雨雷雨之動或退而驟則不能終朝而其科不盈然則康屯之所主以其動盤桓者亦猶震動之𨼆雨施之祁祁上下旡常則為有邪之嫌今初九盤桓則亦有蹢躅之嫌焉其以剛動而志行正地者非蹢躅之比也民非后罔克胥匡以生方屯之時上之分屯亂而罔克胥匡以生則人求主之時也而初九能以貴下賤則民之歸之猶水就下故曰以貴下賤大得民也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也志在於應五者乘馬而欲行難在於廹也故班如而有待二欲應五而初九為之偪若為冦者也而初九之情求合而已故曰匪冦㛰媾夫㛰媾者人之至情初九以㛰媾求二而已以女子柔弱之才能不字者凢以正故也夫屯有必觧之道以静正待之十年斯反矣故曰十年乃字反常也六三即鹿无虞惟入于林中君子幾不如舍往吝象曰即鹿旡虞以從禽也君子舍之往吝窮也上六遠在一卦之外而不可即猶野物之善走者也故稱鹿焉上體坎也幽險也故稱林焉屯難人求其主之時然欲不度而即上六是猶即鹿旡虞惟入於幽險之中而已若然則屯雖求主之時殆不如舍之愈也其稱君子也以謂體决躁之性居動之極此以六居三非守常者非君子不能舎也不舎而往則雖君子不能无吝窮六四乘馬班如求㛰媾往吉无不利象曰求而往明也臣之於君聘而後往往而相親有㛰媾之道焉六四雖體趨下之性然柔而正也故乘馬班如待求而後往求而後往則去就之義明矣盖求而不往謂之固不求而往謂之躁非所謂明也且求而不往則利止於一身不求而往則㐫害隨之吉无不利其可得乎九五屯其膏小貞吉大貞㐫象曰屯其膏施未光也觧之所以為觧者以雷雨溢而作也雷雨博施草木廣生今屯其膏則豈足以康屯如而為觧出納之吝謂之有司故小者以為貞則吉大若以為貞則㐫方屯之時尤不可以屯其膏也㐫不亦宜乎上六乘馬班如泣血漣如象曰泣血漣如何可長也六二之乘馬班如其勢不得不待也六四之乘馬班如於義不得不待也上六可以出險矣非其勢不得不待者也九五非應非於義不得不待者也而猶乘馬班如宜其憂傷而至於泣血也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也險以遠之為善故險在前則止止則不犯險者也險在中則貴動動則免乎險者也䝉之為卦險在下可以動矣而猶止非其勢不可智不足也故於卦為蒙蒙有亨之道焉盖人之性至明始有蒙之故不得明猶鑑明而塵蒙之也塵雖蒙之鑑之明故在也拭焉而明復其初矣人之蒙亦若是故蒙有亨之道焉蒙有亨之道而九二以剛中亨蒙之道行焉有剛中亨蒙之道又有巽順求亨之時此蒙之所以亨也時中云者與時適當不先時亦不後時也九二屈而在下疑若求童蒙者然九二剛中也故曰匪我求童蒙六五尊而在上疑若不求我者然六五順以巽也故曰童蒙求我志應云者以誠應而無𨼆乎爾之謂也學者占中否於教者猶之筮貴不瀆故曰精以卜筮神動其變初筮則其志一故告焉待初筮而後告者剛也得初筮則告之者中也再三則瀆而志不一故不告焉以惑而告之其惑滋甚故也蒙者盖若童蒙然不知所如往此易於養正也其所以養正而不入於邪者此則聖人亨蒙之功也盖求我而應之筮我而告之恐其瀆蒙則不告焉如是則蒙者由之養正非聖人之功而誰與書曰聖時風若又曰蒙恒風若聖與蒙反者也非聖人不能使蒙養正矣象曰山下出泉蒙君子以果行育徳蒙者物之穉也物穉不可不養而泉者養源於山者也養源於山故其出不窮流於川瀆而放於海君子之果行育徳當若此而已以成徳為行此由中出教者之事也以果行育徳此自外出學者之事也學務時敏厥修乃來行之不果非所以育徳也初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也隙之見小有物蒙之也為發其蒙之者則所見大矣初六發蒙其義如此發蒙使之見善也利用刑人使之遠惡也傳曰時過而後學則勤而難成然則發蒙宜在初六之時矣又曰小懲而大戒小人之福也然則刑人亦宜初六之時矣用說桎梏以往小人不懲其惡滋蔓而難圖也故吝九二包蒙吉納婦吉子克家象曰子克家剛柔接也以義則發蒙以恩則包蒙盖家道也堯典於九族不言平章者家道貴包蒙恩也納婦禮也六五以柔應之而九二有男下女之道故納婦吉包蒙納婦旡不吉于家者也克之為言公勝私也公勝私用是義勝恩以六五以父而用柔而九二以子用剛故也故曰子克家剛柔接也六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也以順為正者婦道也六三舎其正應見九二非禮之金夫而不有躬其行不順故稱女焉九二納婦吉以所納者順也然則行不順之女宜勿用取矣六四困蒙吝象曰困蒙之吝獨遠實也知得困蒙則旡知而已故吝夫得君子者悔斯光窒斯通困蒙之吝以不得君子而親炙之耳故曰獨遠實也教者為實學者為虚實固有以分人虚固有以受道六五童蒙吉象曰童蒙之吉順以巽也禮恭然後可與言道之方辭順然後可與言道之理色從然後可與言道之致故學問之道非順以巽則教者不告也順則於理為順而巽又有柔損之意焉六五晦也以晦求明於理為順六五尊也以尊求卑則於道為巽上九擊蒙不利為冦利禦冦象曰利用禦冦上下順也蒙之初則蒙之而已蒙之極則頑固矣非擊之不可判也上九以剛過擊蒙故有為冦之道為冦則逆上下之願而禦之者至故曰不利為冦利禦冦也乾下坎上需有孚光亨貞吉利渉大川彖曰需須也險在前也剛健而不䧟其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也需之為卦險在前也險在前則宜不進以待矣而乾有知險之徳能不進以待者也故於卦為需卦而動乎險中者以濟難之任在我不得不動故也有見險而止者以濟難之任不在我義可以止故也需之成卦九五以中需物物之才在上則在下者无俟乎動也又不可以止也有待而後進則无躁動之嫌焉是以須也剛健而不䧟非剛健之才不可䧟也以能須故不䧟耳使其不知險而犯焉則雖有剛健之才能不䧟乎險者剛健之才而䧟乎險不能无困窮雖不䧟於險而非有剛健之才則亦无以自逹而困窮至矣故惟剛健而不䧟於險其義為不困窮也需有孚光亨貞吉位乎天位以正中也者言聖人在上而需天下也其需天下也不正而偏不中而倚則不足以平施而用物故惟中正而後需道孚於天下而光亨貞吉也利渉大川往有功也者言不以剛健自任知險而需則始可以渉難而有功也象曰雲上于天需君子以飲食宴樂雨之所潤者草木而已而草木之生人取以養焉則是雨之所潤者狹而其功實廣也飲食宴樂者忠臣嘉賔所與親者也而忠臣嘉賔所與親者民偕以養焉則是飲食宴樂雖所及者近而其功實遠也不然則聖人之所及天下豈止及乎所親者哉初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也險可以觧則雖動乎險中可也險不可以觧則俟之不厭矣而初九最遠乎險故須於郊郊者遠於有事之地也以郊為遠乎險則是有事之地為險也盖大道甚夷離道而有事則夷且險矣今夫為國家者居必設險以為固動必行險以為戒則是國者險之所在也故易以郊為遠險之地焉夫逺於險而未甞犯則不知險之為害也又以剛動之才處於下則疑其不能固志故利用恒无咎也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也稱需於郊則是以國為險也需於沙則是以川為險也人心尤險于川則是險之在人者尤宜遠之也故於遠險者稱郊而於近之者稱沙於迫之者稱泥焉乾之九二稱寛以居之履之九二稱履道坦坦則是寛衍而夷易者莫如二之中也故曰需于沙衍在中也以近於險故小有言然而寛衍在中未嘗廹險故以吉終焉九三需于泥致㓂至象曰需于泥災在外也自我致冦敬慎不敗也九三廹險故需於泥致冦至者非其道有以招之也苐不能遠之故冦至耳觧之六三則有道以招之而冦至也需之九三以敬慎故不敗觧之六三暴慢故咎歸焉六四需于血出自穴象曰需于血順以聽也隂陽之分各襲其情則不至見傷焉各履其位則不至扵自失惟陽在下而欲上隂在上而阻下故見傷而需於自失而出自穴也隂見傷則不順以聽矣九五需于酒食貞吉象曰酒食貞吉以中正也雲上於天則所需方在上而未下也故言飲食宴樂者所需方及朋友故舊兄弟甥舅忠臣嘉賔而未及民也需於酒食則及民矣盖凢民莫不有酒食之養但不得與人君宴樂耳今九五獨言酒食而不言宴樂是以知其及民也盖中正盛徳九五尊位故能需於天下之求无不厭足其分傳曰聖人之道猶中衢而置罇焉盖需于酒食之謂也酒以合歡所謂孫者得需於酒之道而已食以致養所謂由頤者得需于食之道而已非尊位大中弗能兼也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也六四非衆剛之主也剛來而拒之故出自穴上六衆剛之主也剛來而受之故入於穴賔有服意客則適道也乾剛上進非賔也客而已苟以敬待之則終吉豈至於大失也九三雖冦至猶以敬慎而待之而得不敗况三陽為客非寇乎以敬得吉宜矣坎下乾上訟有孚窒惕中吉終㐫利見大人不利渉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終㓙訟不可成也利見大人尚中正也不利渉大川入于淵也訟之為卦險者欲䧟健者欲决其情相攻而不相入此所以為訟而訟貴有孚而見窒則可訟然君子之至誠則宜不可檢者也今猶可檢則吾之誠未至歟是以惕而不終訟也窒惕中吉九二之才也乃若上九則窮剛於上是以窮其訟者也故終㓙訟必有聽之之主以中正為尚也盖兩造之訟聽之不中而倚不正而偏則愛惡不得其平故曰利見大人尚中正也渉難必有烝徒之助雖有烝徒之助而不同心協力亦不可以渉訟方違行非同心協力之時也渉難奚可哉故曰不利渉大川入于淵也象曰天與水違行訟君子以作事謀始一卦之象凢數物若坎為水又為雨離為火又為日是聖人之於大象取其一而遺其他者各象其類而已故上剛下險險而健訟之才既成則於二體取天與水為象焉坎為水又為雨取水而不取雨則以雨者隂陽之和非訟之義故也猶之同人也柔得位得中而應乎乾文明以健同人之才既成則取天與火為象焉離為火亦為日有取火而不取于日則錯行非同人之義故也作事謀始所以致無訟之道也始乎治猶卒乎亂况始之不謀而求其終之無訟乎初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也彼險而此健所以為訟如彼險而此以柔也且在訟初則雖不能无訟亦不永所事小有言而已其有言也乃六四以剛犯初而其曲在四其辨自明是以終吉也九二不克訟歸而逋其邑人三百户无眚象曰不克訟歸逋竄也自下訟上患至掇也下宜聽上而不可以訟上自下訟上則犯義矣宜其不克也二為主于内而二隂附之三百户之邑也往訟不克乃歸而有其邑則眚且至矣何則下之所以敢訟上者以附之者衆也往訟不克復歸而有其輔已之衆則上之勢求艾必求其根穴而窮剗之矣故必逃其固有存之邑不敢據而後无眚也六三食舊徳貞厲終吉或從王事无成象曰食舊徳從上吉也徳也者保其所有而已六三之食舊徳是也謂之徳者以心不能不得故思從上以保之也夫失得勿恤則往吉无不利今心得其舊徳而思保之則從上而已非所謂從道不從君也故曰或從王事无成九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九二不克訟以下犯上其勢不克也九四不克訟以剛反柔其義不克也其義而即聽者之命變其貞而安貞則其吉宜也訟不至於用師也同人之九四用師尚弗克攻然且反則而吉而况不克訟而復命者乎九五訟元吉象曰訟元吉以中正也建中則不可㧞守正則不可掇有欲㧞其所建而掇其所守則大人有所不受而訟矣以脂韋從人趨取无訟兹固足以示謹然中不得建而㧞正不得守而掇則吾之大節䘮焉何元吉之得乎此大人所以有訟也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也好違而尚隣固足以𫉬人之與然其與之者非剛而有立也乃柔從鞶帶者而已夫以中直相與則其利斷金人莫能間彼柔從若鞶帶者何往而不為順哉雖或與之其志不一而人易以奪故曰或錫之鞶帶終朝三褫之夫以訟得其所與者柔從易奪之人至於終朝三褫之亦何足敬哉坎下坤上師貞丈人吉无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師之成卦以行險而順也軍制自五而積之至于師則至衆矣衆而无正則亂故必丈人而後吉无咎焉丈人者其為長度越於尋常者也盖不能度越於尋常則亦衆人而已安能正衆哉能為衆正者將也傳曰師能左右之曰以能以衆正則能將之謂也故曰能以衆正可以王矣剛中而應帥師之才也行險而順行師之道也帥師而不剛則是以羊將狼不可也剛而不中是以狼將羊不可也雖剛中而上不應亦不能行焉故帥師之才剛中而應然後善也兵㓙器戰危事雖武王不保其必克此天下之至險也行險而天下是奉以除民害則是行險而順也險而順則師之所加若時雨降而民悅矣故曰以此毒天下而民從之也師之行險以除民害猶醫之用毒以攻人疾故曰以此毒天下其曰无咎者治天下至於用師則其吉足以補過也象曰地中有水師君子以容民畜衆地之於水能包容而畜止之此師之象也故君子以容民畜衆容民者民歸之斯多助矣畜衆則衆聽焉斯益辦矣是乃所以為師也荀子曰善附民者乃善用兵者也此之謂也且容民畜衆而師成焉則舉而措之乃可以去傷民而除亂衆矣去傷民所以容民除亂衆所以畜衆也初六師出以律否臧㐫象曰師出以律失律㐫也以不必必之故多兵今其至於用兵則是常以不必必之也以不必必之而至於用兵猶且必其勝而往焉則是重造兵也故聖人於用師之初不敢自必其勝負吹律以聽焉太史公曰六律為五事根本其於兵械之興也望敵而知吉㐫聞聲而較勝負故周官太師吹同律以聽軍聲苟為失律雖臧㐫盖幸之不可以為常也九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也師以行險九二中險而居焉在師中者也一柔一剛仁勇兼具下尊之也為丈人上親之也猶長子故吉无咎用師至於吉无咎則天下之難平王可以錫命懷諸侯矣三者衆辭也故聖人於賞則勸於刑則畏惟畏刑故殺伐欲其約所謂王用出征有嘉折首𫉬匪其醜者是也惟勸善故錫予則欲其博所謂王三錫命是也六三師或輿尸㐫象曰師或輿尸大无功也虎豹便㨗熊羆多力然而人食其肉而席其革以不能通其智而一其力故也師貞夫一則衆不能獨進亦不能獨退與虎豹熊羆異焉以六三帥師則是主之不一也師或至于不一之主則凶之道豈有功乎六四師左次无咎象曰左次无咎未失常也師左次无咎猶所謂井甃无咎也井以動出為功今乃静正于修井則可以无咎矣師亦不貴夫乆于静乆于静則頓兵老師非所謂拙速也今左而不為乆處則可以无咎矣六五田有禽利執言无咎長子帥師弟子輿尸象曰長子帥師以中行也弟子輿尸使不當也行險而順則雖毒天下而民從之六五體順故田有禽天子討而不伐故利執言則師出有名矣執言以討則有奉吾辭以往者長子可也弟子凶也長子一人則弟子者衆故也長子謂九二弟子謂六三上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也慶賞刑威曰君師出有功則既成矣開國承家賞亦重矣於是稱大君焉開國承家則猶武成之終而分土列爵也夫君子小人並用惟師為然君子則用智小人則用力此其功也君子則開國承家小人則勿用惡小人之亂邦也坤下坎上比吉原筮元永貞无咎不寜方來後夫㐫彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫㐫其道窮也比之為卦以二體則水與地比以六爻則五隂比一陽夫秦之所以亡以孤立於天下而无或比之故也今陽得尊位大中有克比之徳其吉不亦宜乎比輔也者言臣鄰比之下順從者言民庶則順從而已其曰下云者臣鄰則有或尊而民無尊也故曰下焉比吉也比輔也下順從也言為人之所比者也原筮元永貞言比乎人者也原筮者釋所比不可以不審也夫道足乎已而為人之所比則歸斯受之而已不擇可也道不足以比乎人方賴人以為飬則一失所比必有闕㫁之悔可不原筮乎原筮而得元永貞之人則其仁足依亦且乆要而不忘足以无咎也不寧方來以上下應故勿亟而來也夫君臣上下同心同徳和一而无間則危而求安者何所歸走哉不寧之異方然且來比而上六實同體有為婦道而後其夫失隂陽和㐫則冝也象曰地上有水比先王以建萬國親諸侯比者親也以四海之遠而比乎一人則形隔勢絶難於為比於是建萬國使民各親其君焉民各親于君而不歸於其極則其異政之國未可謂克比也於是先王以親諸侯先王與諸侯親而使諸侯與萬民親則九州斯共貫矣初六有孚比之无咎有孚盈缶終來有他吉象曰比之初六有他吉也有孚比之言比孚人也有孚盈缶終來有他吉言為人之所比也水猶可以忠信誠身親之而况於人乎故孚比之則无咎誠有所居以類至故有孚盈缶終來有他吉也缶之為器其中虚者也以虚受故受而不著以虚應故應而不藏人之心若是惟去物之塞而有孚以盈之則終來有他吉矣雖然有人者累故中孚之初九有他而不燕焉其有他而吉者其相親比之道時有在初六而已故曰比之初六有他吉也六二比之自内貞吉象曰比之自内不自失也其人可比而不比則為失人其人不可比而比之則為失己九五有剛中之徳其人可比而六二能比之雖離内而比外舎近而取逺不為自失矣故曰比之自内不自失也六三比之匪人象曰比之匪人不亦傷乎惡木垂隂志士猶不息也况匪其人而比之乎匪其人而比之相推入禍門也六四外比之貞吉象曰外比于賢以從上也六四雖舎正應而比九五然剛柔正而位當故貞吉其曰外比于賢者盖賢者所持惟義言六四之於九五乃義之與比而九五之於六四亦非不義而得義衆也以其舎正應而從義故稱賢焉九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舎逆取順失前禽也邑人不誡上使中也比與周反者也然盡比之道則周在其中此九五所以能使五隂皆比而為顯比也傳曰使天下莫不順比服從文王之事也王者所以使天下順比服從豈若四面之羅使民不得遁而致此哉亦用三驅舎逆取順而已惟舎逆取順是以失前禽也禽有可擒之道而失之非不能也舎逆取順而已邑之寡弱且不誡而安則其安可知矣此不寧之方所以來也上六比之无首㐫象曰比之无首旡所終也聖人能使天下為一家中國為一人既以為一家矣而上六後焉是後夫也夫其可後乎既以為一人矣而上六乘焉是无首也首其可无乎夫猶可後首不可无盖彖者言乎其象者也言象而无其形故以其㓙之緩而未及于身者言之乾下巽上小畜亨宻雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨宻雲不雨尚往也自我西郊施未行也小畜臣畜君也臣之畜君不得位則勢不得行上下不應則衆莫能助盖位不在極而匡弼不當諌而輙諫之則為犯分故不得位則不可畜也一齊人教之衆楚人咻之則齊語不可得故上下不應不可畜也柔得位而上下應之為小畜者如此而已柔者六四之材也才雖柔而其動剛健不剛健則脂韋從上而已非所以為畜也然健而不巽剛而過中則有犯上之事而志不行志不行而不可謂亨也故曰健而巽剛中而志行乃亨也君辨言而善足也非和也獻可替否其和也故畜若和為有雨之象雨者隂陽和也然猶宻雲而不雨者以六四隂雖盛多而交際未及中故也自我西郊者以六居而求離其所故也象曰風行天上小畜君子以懿文徳以臣畜君其勢為難可以暴為之乎巽為之畜矣荀子曰若養赤子若養餒人言不可以暴為也故君子於小畜懿文徳而已懿言浸以光大不為暴也初九復自道何其咎吉象曰復自道其義吉也引其君當於道者臣之職然而彰其引之之迹則有掠美之嫌不如勿彰之為義也今曰吉引君之迹不彰故也夫君唱而臣和君行而臣隨君臣之義也今引其君使復則君臣之義不為无傷惟不見所以引之迹是以於君臣之義旡傷而吉也九二牽復吉象曰牽復在中亦不自失也適堯舜文王者為正道非堯舜文王者為他道正他之間不知謹則舎正而適他矣乃挽而回之不至乎遂往而反此牽復之說也然謂之牽則既有牽之之迹矣有牽之之迹則於唱和隨行之義傷矣苐以牽而能復又且在中得不自失而已荀况所謂以得君而復之道者也九三輿說輻夫妻反目象曰夫妻反目不能正窒也初九所畜者既柔而其柔又正且畜之於初焉是以其義吉也九二所畜者雖剛而剛得中且畜之于中焉是以不自失也九三所畜者剛過畜之則上有所不受而下之志不行矣故有輿脫輻之象焉輿載上者也以剛中則牽之於前亦可也以剛過則載之于下猶不可也畜矣將以為和故有夫婦之道失其和則有夫婦反目之象稱妻者言夫婦不順也荀况所謂諫非而怒之者也六四有孚血去惕出无咎象曰有孚惕出上合志也六四柔而能畜以有為之助者也莫或助之而以柔當三陽之進則无不傷矣故稱血焉惕出而與上合志斯可以畜故曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也交如者兩相交也攣如則衆矣故富以其鄰鄰亦衆意也盖以臣畜君非合衆力不能故曰有孚攣如不獨富也富臣得君也澤加於民而可大之業成焉是所以富也上九既雨既處尚徳載婦貞厲月㡬望君子征㓙象曰既雨既處徳積載也君子征㐫有所疑也上九畜道成之時也故言既處者畜成而功已濟也其功已濟於是既處而復往所載義也如此則其載上非尚力者也尚徳載者也雖尚徳載然謂之載則乘者无為也東西南北惟載者之從耳婦道如是則厲矣故曰婦貞厲月㡬望者言隂盛也君臣之分君行先臣從後豐之初九所以雖旬无咎者以在下而已位極上九以畜為事則雖㡬望猶不可况旬乎㡬望而征求其明亢而與旬焉則終其魄而已時乃天道君子能違天乎故曰君子征㐫有所疑也兌下乾上履虎尾不咥人亨彖曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也老子曰善行者旡轍迹聖人之遊人間世不欲其有轍迹有轍迹所謂畫地而趨也畫地而趨亦已殆矣而履者迹所出也是以聖人之於履常若履虎尾然也然能以說應之是以亨焉乾健而不可犯虎之象也履而不見咥者為其以柔履剛而應乎乾所以亨也聖人之所謂說者非務可人心而為柔從也以卦考之聖人之所謂說者剛中而柔外所謂内直而外曲者也其說不如是則為顛為躓為傾為失何能亨哉在下以柔履正則和説而能以履位矣上雖宜以剛健然不可過而恃乎已當以中正而符乎剛柔之節也故曰剛巽乎中正而志行九四以柔麗乎中正故亨剛以中順為節則小人不得為之疾矣小人之於人猶耳之有充目之有翳雖有光明之資亦為之蔽矣不疚于小人則光明自若也履非特貴賤履位矣君子小人各履位故其言及此象曰上天下澤履君子以辯上下定民志聖人弱其志故善下衆人強其志故好陵也非辯上下以定之則志莫定矣天地尊卑是以辯上下而象有取於上天下澤者澤有說意使民說於下志所定也初九素履往无咎象曰素履之往獨行願也近君而不得中則有愬愬之懼其失位在下則為素履而已夫履不處也雖旡與為偶亦獨行其願不如是則素𨼆者也非素履也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也近君而不得中則有愬愬之懼九二遠于君而又得中也故曰履道坦坦言安行而不為險之所䧟前不得阻之所礙也理人之道散而成章則能使天下文明焉合而成體則非徒天下之無文也吾亦將素履亦非徒天下之不明也吾亦且為幽人貞吉者以中不自亂无遜言屈身之事故也六三眇能視跛能履履虎尾咥人㐫武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之㐫位不當也武人為于大君志剛也視欲正視而不正則眇者也行欲中行而不中則跛者也故歸妹之九二則為眇能視初九之不中則為跛能履履之六三既不正又且不中故眇能視跛能履兼焉九二幽人則不自明而已眇能視則不足以有明也初九獨行願則无與行而已跛能履則不足以與行也不足以有明則見險不察矣不足以與行則避難不速矣是以履虎尾遇咥人之㐫也其明不足以見微其行不足以經逺志剛而已耳是武人為於大君而不足言㐫則以武人者行事于㐫者也豈復以㐫害為恤哉九四履虎尾愬愬終吉象曰愬愬終吉志行也九四處乾體之末履虎尾者也虎至暴而不可犯然應之以說而得亨履之能懼而終吉是說之道无往而不入懼之道无往而不克也九五夬履貞厲象曰夬履貞厲位正當也夬之所以决者以柔上乘而不履位也今剛柔履位則旡所事决矣而九五猶以夬履是于貞為厲也厲不至於㐫也六三之㐫以位不當九五之厲而已以位正當也盖履者以柔履以說應而九五以剛决其有咥人之㐫也惟位正當是以有厲也上九視履考祥其旋元吉象曰元吉在上大有慶也上九履道成矣聖人之于成也欲履省焉故視履考祥祥在天者也以言考祥則以謂履在下而應在上不可不戒懼也夫履者迹之所出惡迹愈走不如反䕃以息迹是以其旋元吉而象以謂大有慶也乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也往者屈也來者伸也大者來而伸則天下浸以昌小者來而伸則天下浸以微所以成否泰在大者小者相與往來之間而已小者往而後大者來猶遏惡而揚善也在天而為盈虚消息在人而為興衰治亂不離一氣陶運之間而已故言天地交又言上下交上下交以人事言也天地交而其氣通然後萬物通焉上下交而其志同然後天下之志同焉於天地不言其氣而直曰萬物同於上下止言其志不曰天下同斯以天之所交者氣也言天地交則其氣以通矣是以不言其氣言萬物也至于人則有其體雖交而志不利者若所謂友而不心是也志不同而求天下之同盖不可得志同則天下同可知矣是以言其志而不言天下也内陽而外隂言萬物所以通内健而外順言志之所以同也盖内陽以化育于下外隂以生滋于上則萬物成故知内陽而外隂言萬物之所以通也内健然後能用君子不如是則浩然有歸志豈能奪其志與同哉故知内健而外順言其志之所以同也内健而外順則君子内矣君子内則小人外故先言内君子而後言外小人舜選於衆舉臯陶而後不仁者遠此内君子而外小人之序也内君子故君子道長外小人故小人道消長如草木之長不見其益而乆之則大矣消如氷雪之消不見其損少頃則亡矣此聖人所以慎微也象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地之道不必寒暑之運也凢為盈虚於一體之中者即天地之道也天地之宜不必百物之成也凢為儀則於一性之内者即天地之宜也凢為盈虚于一體之中者聖人裁成之不使其過所以不乖其委和凢為儀則於一性之内者聖人輔相之所以不悖乎其委順此后所以左右民之功也夫民受氣於天地之中則或偏於左而毗陽或偏於右而毗隂后左右之使由中而已於泰言此何也泰者衆賢進之時也衆賢進乃左右民舜曰予欲左右民汝翼然則為股肱以左右民者衆賢而已耳初九㧞茅茹以其彚征吉象曰㧞茅征吉志在外也初九以其時則小往大來以其君則内健外順此君子所以引類而進也茅之為物可用事神㧞之則以其茹舉君子以類進之象也君子以類進則協衆力以御神器合衆智以經國體而天下安乎泰矣九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也荒者行不治者也蒙者才不明者也治蒙之所先者行而不責才故曰包蒙何則跅􅕟之士聖人猶將御之以為用故也夫事君以身不若事君以人然天下之人行治而才中者豈易得哉行不治而荒者包之而不遺才不中而馮河者用之而不舎則行治而才中斯烝然來矣包荒用馮河而又不遺逺不眤邇此所以得尚于中行之君也孔子得顔淵而門人益親為天下者亦必得人如顔淵者為之和集君子而附之然後天下可為也其人則九二是也未仕則欲彚征故於初九言之已仕則欲朋亡故於九二言之九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福象曰无徃不復天地際也上下交而其志同則厥孚亦交矣今平者將陂往者將復則或有異志而孚不足之時也然君子為可信而已豈求人之必信也哉故曰勿恤其孚則不枉已以顧望同其上矣是乃所以𫉬孚而于食有福也六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也君子所以去之而𠖇飛者以君不能下之而已苟為下之則亦赴之惟恐其不疾從之惟恐其不先矣詩曰翩翩者騅烝然來思盖翩翩不富以其鄰之謂也翩翩不富以其鄰猶所謂彚征也未在位也故言彚已在位也故言鄰在位而言鄰謂臣鄰也動而之外也故言征動而趨於下故言翩翩亦各有所當也隂道常乏陽道常健故隂得陽而後實三隂在上皆失實者也皆失實則其求陽也不戒而孚矣六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也帝乙歸妹言至尊以柔接下也夫天下安平而至於泰則非禍難之可虞也非患賢才之不足也又非其微弱而不能自振也乃能屈其至尊以至柔接下則亦中以行願而已冝其元吉也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也否之時上下不交而天下旡邦天下旡邦則旡以為藩翰屏蔽者矣城復于隍之象也城復于隍則衆不為用故勿用師如是則小者擅命矣故曰自邑告命貞吝坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下旡邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也經曰天地變化草木蕃天地閉賢人隐然則賢人之𨼆見猶草木之盛衰隨流於天地而已由是觀之天下之否賢人何預焉天實為之耳故曰否之匪人也夫文明以健中正而應者君子之貞也方否之時小人道長且欲文明乎則私邪者惡焉且欲中正乎則私邪者疾焉是以不利君子貞也維不利君子貞故大者不容而徃小者馴致而來其曰天下无邦者言其无邦而可為用猶所謂城復于隍也内隂而本衰矣外陽而末大矣本衰而末大此物之所以僵且斃也内柔則其於用人亦不我力矣外剛則其於接人視我邁邁矣如是則小人内而君子外是以小人道長而君子道消也象曰天地不交否君子以儉徳避難不可榮以禄天地閉則賢人亦隐焉故嗇其智慮秘其聰明不欲泛應而博用也期於避難而已夫忠信重禄之時則榮以禄所以昭吾之忠信也又何嫌焉乃若貪汚取富則榮以禄非義榮也是以君子惡之也初六㧞茅茹以其彚貞吉亨象曰㧞茅貞吉志在君也初六者賢人退處之時乃曰㧞茅茹何也庸君之於賢非不欲引之引之非我力而已賢者亦非不欲以𩔖進惡不由其道而已惟其如此故賢者以其類而守正也吉亨不亦宜乎泰之時君子内矣君子雖在内而志在天下故曰志在外也否之時君子外矣君子雖在外而志乎朝故曰志在君也六二包承小人吉大人否亨象曰大人否亨不亂群也小人之在下也君子不得遯則包之斯可矣小人之在上也君子未能决則承之斯可矣雖然此不免乎亂群也乃若大人則足以格君心之非而否亨焉以其上應休否之君足以有為故也六三包羞象曰包羞位不當也泰至於九三則將復於否矣否至於六三則將復於泰矣方天地之閉則君子自𨼆可也今將復於泰矣而猶包焉是可羞也羞則不特无譽且有毁之者至矣九四有命无咎疇離祉象曰有命无咎志行也九四才有餘而位近君可以行其志之時也然否之時小者常擅命矣五方休否則不可以无命而行无命而行則是小者復擅命如否之時矣以此比乎休否之君則其身之不免况有祉以及疇乎故有命然後无咎无咎然後疇離祉也九五休否大人吉其亡其亡繋于苞桑象曰大人之吉位正當也休如休王之休休否則復王而為泰矣非以其道御者也孰能使人之休王係乎我哉故曰休否大人吉雖然休王之理相為倚伏豈可遇其存以為亡哉惟不忘亡乃所以存而不亡故曰其亡其亡繫于苞桑象曰位正當也以謂雖有大人之才非得大中至正之位則亦不能有為而休否矣上九傾否先否後喜象曰否終則傾何可長也滿而必傾者物之理也夫否匪則其傾亦匪人也君子宜旡憂喜于其間矣然旡否則君子不與執御同其憂至其傾也則與天下共喜焉與先號咷而後笑異矣周易新講義卷二
