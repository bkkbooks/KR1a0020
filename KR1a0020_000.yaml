body:
  text: 周易新講義易𩔖提要臣等謹案周易新講義六卷宋耿南仲撰南仲字希道開封人靖康間以資政殿大學士簽書樞宻院與吳幵議戰守之説力主割地南渡後遷謫以終是書舊本或題進周易解義疑為侍欽宗於東宫時經進之本前有南仲自序曰易之道有要在无咎而已要在无咎者何善補過之謂也又曰拂乎人情是為小過拂乎天道是為大過南仲是説葢推衍尼山無大過之㫖然孔子作文言傳稱知進退存亡而不失其正作象傳稱雲雷屯君子以經綸行止斷以天理所以教占者之守道艱險濟以人事所以教占者以盡道其曰無大過者葢論是非非論禍福也如僅以无咎為主則聖賢何異於黄老僅曰無拂天道則唐六臣輩亦將謂之知運數哉南仲畏戰主和依違遷就即此為求无咎與無拂天道之説有以中之是則經術之偏禍延國事者也然大致因象詮理隨事示戒亦往往切實有禆究勝於髙語元虚晦蝕作易之本㫖者節取所長可矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易新講義原序易之為言變也盖道之變名也道體常而盡變乃全著以為書而滯于言象之間言有常理而象有常形則宜于變有所不能盡然而言象之間化而裁之推而行之而其變无窮焉是故特以變稱而命之曰易也繫辭之言易者屢矣一言而盡易之義者易无體是也盖有體則定而不易其所隂陽合徳其道屢易而不居者乃以其无體也易无體也易无體而有書何也猶神无方而有蓍龜之神物也神不在物則是物外者神之方烏得為無方易不在書則是易外者易之體烏得為无體故神有物乃所以為無方易有書乃所以為无體也易之為書始于作卦作卦則三畫而已終于重卦重卦則有六爻焉以謂其六爻具而位判焉其定位易見而法象具惟天地人之三極耳以故三畫象焉然而六畫則三極之謂也又有所以極道之者天之道曰隂與陽地之道曰柔與剛人之道曰仁與義總之九六故以六爻具焉六爻具而剛柔變化吉凶悔吝錯綜其間探之不得其端循之不見其緒矣雖然易之道有要在无咎而已要在无咎者何善補過之謂也凡天下有侈乎至足之分拂乎自然之宜者皆過也拂乎人情猶為小過拂乎天道是謂大過聖人之作易順性命調而𥙷之使天下後世觀其象而玩其辭則𫉬自天之祐而無大過盖所謂善補過者孔子曰假我數年五十以學易可以無大過矣以是知易之要在无咎而已然而易之生蓍倚數立卦生爻眞筌蹄之寄耳所以為易則不在是故經曰易者象也象也者像此者也以為易之為象姑此而已非其真也猶象龍之非真龍也認象以為真則失易之㫖矣
