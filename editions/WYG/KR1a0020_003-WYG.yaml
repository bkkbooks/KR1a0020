body:
  text: 周易新講義卷三宋耿南仲撰離下乾上同人于野亨利渉大川利君子貞􅂏曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志得位而不尊得中而不大且應乎乾而非上下應之也則同人而已雖然不得位則是無獻子之家者也不得中則是无顔般之徳也又好違而不應則雖欲同乎人得乎哉是以得位得中而應乎乾然後為同人也傳曰自其同而視之者萬物皆一也知萬物之為一則吾誰與為親哉无不見之斯可矣故曰同人于野亨野則无適也无莫也廣廣乎无不備也詩曰渒彼涇舟烝徒楫之言渉險之待衆也同人于野則衆无不同於是乎可以渉險故曰利渉大川夫同人于野則大小不間于異體利渉大川則南北不患乎異心是謂不同同之不同同之則大矣故言同人曰以别之言所謂同人者義盡于此矣乃若文明以健中正而應則君子而已盖文明者禮也燦然與物接者也健則能違焉中正者徳也介然與物辨者也應則能從焉與物接而能違焉與物辨而能從焉此君子之所以不可得而踈又不可得而親然有違有從則與夫同人于野而小大不間于異體利渉大川而南北不患乎異心者固有間矣然違而知從從而知違同于道而已是乃所以通天下之志也詩曰既見君子我心冩兮非能通天下之志何能一見而冩人之心哉象曰天與火同人君子以類族辯物天道上行而火炎上所以為同人天道徧覆於族旡分也於物无擇也火性明察君子於是以類族辨物也族之不類物之不辯皆比而同之則何異乎墨子之尚同哉亦不能與同矣初九同人于門无咎象曰出門同人又誰咎也大有大畜則人應乎我同人則我應人人應乎我則雖不出户而户外之􅋰已滿矣我應乎人則欲不出可乎故初九同人于門然後无咎也六二同人于宗吝象曰同人于宗吝道也宗者所以類族者也象言類族則使萬物百族各類于宗所以群天下之物則然也乃若所以處已則人苟有合志同方營道同術者皆可與同人矣又奚擇其宗哉此同人于宗所以為吝也九三伏戎于莽升其高陵三歳不興象曰伏戎于莽敵剛也三歳不興安行也火形銳上而性炎上九三實體之故有伏戎于莽與升高陵之象焉然三軍可奪帥也匹夫不可奪志也六二雖匹夫有其志不奪九三雖伏戎而帥可奪如是則不敵逺矣是以伏戎于莽不敢直鼓而前也伏戎于莽知其不可而不得不伏也升其高陵俟其小而或可升也惟義之不勝是以三嵗不興焉九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九四之反則非特以處柔平而已亦其犯義之未甚而其𫝑得反之也盖乘其墉其亢不至于升高陵且又无伏戎之事故得反則也彼九三之為不義至于伏戎于莾升其高陵則雖欲自反无由矣九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也二之與四合并其𫝑以攻五所以為大傳曰同與相愛同取相疾同病相愛同壯相疾同道相愛同藝相疾二之與四皆欲争五可謂同取相疾一則升高陵一則乘其墉可謂同壮相疾矣而二之與五乃以中直相與則是同道同道則相愛者也彼以同壮麗之焉日相離疾此以同道損之焉日相親愛則大師有克五之勢而可憂然以義克之而後笑矣上九同人于郊无悔象曰同人于郊志未得也通天下之志乃同人之志也今獨遠于有事之地所以為志未得然與夫求其志至於奔營憊而弗克而反者尚得為无悔乎乾下離上大有元亨象曰大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨天下大器也不可以小道治小力持也必有大人相與輔相之然後能勿失也故天下貴其有大焉畜則宜以剛有則宜以柔得尊位大中而上下應之所以為大有彼得尊位矣而曰上下應之者謂其為賓師者也其徳剛健則與執我仇仇亦不我力者異矣其徳文明則與君臣上下動无禮文者異矣聖人所以能有大不過如是而已謂之文明者其文炳則文之明者也其文蔚其文萃則文之不明者也然文至于成章則旡不明矣故章為文章之章又為章明之章也易之稱文明可以類推矣其徳剛健而文明固足以有大矣有大而不能用元亨亦不可得也夫聖人所以有大雖曰剛健而文明以致之其實天以休命命之耳夢帝賚予良弼是也應天所以命之意而時行焉則元亨矣大畜所謂應乎天與此同意象曰火在天上大有君子以遏惡揚善順天休命火在天上聖人高其目以視逺之象高其目以視逺則善惡見矣其于遏惡揚善也何有遏惡揚善豈聖人作好惡于其間哉順天休命而已天之休命遏惡而揚善人之大情好善而惡惡順乎天之休命則順乎人之大情也初九无交害匪咎艱則无咎象曰大有初九无交害也内有可交之徳而无交焉必外无可交之人也外有可交之人而无交焉必在已无可交之徳也大有尚賢之世非天下无可交之人於是時而獨无交焉則於可交之徳為有害矣然而體乾之徳而非有咎也故匪咎者疑乎有咎猶疑為冦而稱匪冦也知難則至无咎矣九二大車以載有攸往无咎象曰大車以載積中不敗也車之為器輪圓而輿方轅縱而衡横備圓方縱横之車而又大焉則尤足以任重而致逺者也君子仁圓而義方且有縱横之才智任重而不覆致遠而不敗大車之象也如是而上應六五之君則有攸往又何咎哉九三公用亨于天子小人弗克象曰公用亨于天子小人害也聖人之用小人則貫魚以宫人寵不使之升降自如也用君子則使升降自如而不制焉是之謂亨若非處賔師之盛位則无是也公用亨于天子亦以處盛位而已乃若小人而使亨則是遂其欲而无不為矣故曰小人弗克也九四匪其彭无咎象曰匪其彭无咎明辯晳也九四處盛位則宜公而无私故五等之爵􅇰尊者稱公荀子曰不下比以閉上不上同以疾下可謂公矣以不下比為公則九四不比乎下亨于天子之臣得以處盛位之宜矣非其明辨晳不足以與此六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也誠者合内外之道也故曰厥孚交如交如者合内外之道也誠信生神神則不怒而威故厥孚交如則威如隨之也象言信以發志者志之所潛深矣明信以發志則能以赤心置人腹中是乃所以交如也易而无備者以謂道徳之威既暢于天下則阻法度以為威无所事也上九自天祐之吉无不利象曰大有上吉自天祐也􅂂信務以復其言思順務以和其行此則獨善其身未足以致天祐也􅂂信而于任賢不貮思順而于從善如流施信順于尚賢如是則于天之休命不逆是以自天祐之夫聖人尚賢者以道之所在故上之非將以邀福于天也自天祐之耳艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也柔有常勝之道也及以馳騁天下之至堅无往而不利此謙之所以亨也夫天之有光託于物而後見故天下濟也其道乃光坤含萬物也其化乃光天道下濟而光明則堯允恭而光被四表是也地道卑而上行則舜之温恭而元徳升聞是也夫冲而不盈謙而不亢道之體也是道也逹乎高深通乎幽遠无不在焉故盈而不冲天之所虧地之所變鬼神害之而人亦惡焉謙而不亢則天之所益地之所流鬼神福之而人亦好焉天地之大鬼神之幽與夫人事之衆莫不歸徳于謙則謙之于天下旡不勝矣故施于尊則有光施于卑則不可踰焉二典于堯言克遜於舜則不言盖天子之尊則遜足以稱微則遜不足道也故謙于尊言光卑言不可踰而已亦猶是也有成位而不謙其終必危有天徳而不謙其終必䘮然則謙者君子之所有終之道也象曰地中有山謙君子以裒多益寡稱物平施經曰徳言盛禮言恭内之篤實也如山則徳盛矣外之卑順也如地則禮恭矣徳盛禮恭然後謙體具盖徳不盛則有狎侮之心禮不恭則有驕亢之容皆非所以為謙故也夫多者乆而益寡者浸而亡物之常理也乃若用謙則多者非徒不溢也且可以裒焉寡者非徒不亡也且得以益焉多寡云者時之與物功之與能皆是也雖然謙之所施又不可以不稱也物又不可以不平施荀子曰賢者就而敬之不肖者踈而敬之其敬一也其情二也其情二所謂稱物其敬一所謂平施初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也或以徳下人或以功下人乃所謂謙也非有徳也非有功也是宜為人下非謙意也初六以盛徳下人非宜為人下者於是稱君子為謙謙因其可以渉難而有功故曰用渉大川吉牧如牧人之牧順其性故也順其性故其徳盛制其徳故其禮恭六二鳴謙貞吉象曰鳴謙貞吉中心得也鳴者感以來其應者也鳴鶴在隂其子和之是也二之與三剛上柔下於分為正而九三方以剛下人感之无不應矣是以貞吉而象曰中心之得也九三勞謙君子有終吉象曰勞謙君子萬民服也初六以謙也故渉難而有功然而未及中則亦未有功焉九三過中則既渉難而有功矣夫功亦有不勞而成者功成于勞則其力尤為可矜矣九三不矜而謙是乃所以能有終也老子曰功成不居夫唯不居是以不去此有終之道也人道也人道惡盈好謙勞而謙則萬民服矣六四无不利撝謙象曰无不利撝謙不違則也則略而法詳法容有變則无變焉故終始有常叙而不可違上下有常分而不可亂者則也乃見天則言其協終始之序也困而反則順以則言其上下之分也今九三以剛在下而六四以柔乘之疑若違上下之法則矣撝去三之乗已則於則不違焉六五不富以其鄰利用侵伐无不利象曰利用侵伐征不服也富相十則役相萬則僕物之理也今六五不富而能用其鄰者以人道好謙得尊位大中而謙則尤人之所好故也能用其鄰則多助矣又六二有造兵之釁是以利用侵伐无不利也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上六感九三而求其應者也故曰鳴謙大抵感人心而求其應者求近則其勢易應逺則其勢難六二之感九五則其勢易感之旡不應矣故中心得上六之感九三則三上而不應故志未得也九三之不應其罪可征也然九三得民有邑國之象非以衆勝之則不可征故利用行師征邑國也彼六五不得用衆直侵其國此伐其人者以得尊位大中能以其鄰且所征者六二之正也坤下震上豫利建侯行師􅂏曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫者與物通之時也建侯宜與物通故孟子言置君則必曰謀于燕衆行師亦與物通故孟子言伐燕則必曰取之而燕民悅則取之聖人所以與物通亦順以動而已譬川流而不逆行則浩然通諸海矣盖群一物性類以理因而循之則雖天地不能違何則天亦以易因性地亦以簡循理故也天地以順動則自然之理故日月行其紀而不過四時協其序而不忒聖人以順動則大正之理故刑罰清而民服夫刑罰者矯拂人而制之者也且不煩濫而民服則禮樂政教之以順導人者可知矣彼聖人何往而非順動哉建侯所以興天下之同利行師所謂憂以天下者也刑罰所以去天下之同害作樂所謂樂以天下者也雷在地中而為復復則辨于物矣雷出地奮為豫豫者衆人熙熙如登春䑓之時方是時視濁水迷于清淵有至于𠖇豫者豈觀象而見所謂非豫之幾哉非與日月合其明者孰能與此故曰豫之時義大矣哉象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷出地奮聖人與物之象也衆人熙熙我何為而不樂於是作樂焉其作樂也乃所以崇徳焉與夫熙熙而遂至於失性者異矣能昭天地化育之功者莫如雷能崇聖人化養之徳者莫如樂傳曰樂隆而徳尊作樂崇徳之謂也作樂以崇徳故盛薦之上帝則天神降焉以配祖考則與詩有瞽所謂作樂合于祖同意初六鳴豫㐫象曰初六鳴豫志窮㐫也聖人之於豫若雷出地奮然則豫非不鳴以感物也但其鳴當其時而不妄耳初六於位為下於時為初乃欲鳴而感物為豫是乃不可故曰鳴豫㐫而孔子曰初六鳴豫志窮㐫也六二介于石不終日貞吉象曰不終日貞吉以中正也刳舟剡楫取諸渙服牛乘馬取諸隨繼之以重門擊柝取諸豫者以川􅂗通則暴客至故也非徒治天下為然一身亦若是而已開貞兊以與物通則㐫亦隨至是宜觀柔而蚤正以待之也六二盖與于此方天下交通成和之時物之逐動如雷出奮然而獨介于石焉此善觀象者也介于石言見之先也終日言避之速也見之先而避之速吉不亦宜乎六三盱豫悔遲有悔象曰盱豫有悔位不當也不謟然後可以上交今且盱矣則是顧望其上者也又且遲之則候伺其上者也豈所謂不謟者乎此則盱豫悔而遲亦有悔也九四由豫大有得勿疑朋盍簮象曰由豫大有得志大行也九四體震而為之主者也以象言則萬物莫不由雷以豫以爻言之則隂莫不由陽以豫是以大有得也大有得而勿疑乃能協衆力以安其上猶簮之總衆髪以安其首若自疑則衆疑而暌矣未聞以疑事有功也六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也六五之疾以乘剛而至于貞彼四牡項領則不能无亡矣九四務在協衆以安其上非項領之牡也疾常不死不亦冝乎上六㝠豫成有渝无咎象曰㝠豫在上何可長也六二知㡬盖㝠㝠之中獨見曉焉者也上六不知幾者㝠豫而已雖㝠者明之藏也知生于㝠㝠之中而有渝焉則无咎矣震下兌上隨元亨利貞无咎􅂏曰隨剛來而下柔動而說隨大亨貞无咎而天下隨時隨時之義大矣哉聖人之道至于兼忘又使天下兼􅁯我則民交放于道術之中行不知所之矣則使天下隨之若子之從父弟之從兄豈无勉為仁以要人揚行以悅衆乎以剛柔言之剛上而柔下則剛柔尊卑之常也剛自外而為主于内則剛柔屈伸之宜也今剛不處上而來又來而不為主取下柔而已則是反尊卑之常反屈伸之宜矣自二體言之止而說者聖人所以感物之道也動而健者天所以命物之道也今不止而動而健取說而已則是不感物于自然不應天之无妄矣是以不免為仁以要人揚行以說衆者也是以不能无咎矣以大亨貞而後可以无咎天下之所隨者聖人聖人之所隨者時也聖人之所隨時則莫非時也失所隨之序者不足而義甚㣲非與日月合其臨照之明與四時合其消息之序者不足以與此象曰澤中有雷隨君子以嚮晦入宴息治則進亂則退此隨時之大者也春而作秋而息又以之明而動晦而休則其小者也小者猶隨之而不違則大者可知矣明而動晦而休莫非隨也而獨言嚮晦入宴息則以謂知隨則无故也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也法而不議則法之所以不至者必廢職而不通則職之所不及者必墜故欲有渝渝而失正則巧佞亂官宜矣故正然後吉夫官者有分職自守而已矣奚其交然欲有次不可以无交先王以天地名官天地交而萬物通則官固不可以无交矣故曰人道交而功動成交之出門而往從之則其交也親故出門交有功不失也六二係小子失丈夫象曰係小子弗兼與也剛足以自亡也徒以隨時故來而下柔則其於人也隨之而已非係也柔不足以自立而隨人則非徒隨之亦且係属之而不能違矣故六三六二上六皆稱係焉係小子失丈夫失所係也盖以隂居隂則不足于明又不足于斷不足于斷故不能違近而趨遠不足于明故两者之間不知擇所係焉六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也初九之于九四於他卦為不應也今則交焉六二之於九五於他卦為應也今則失焉以謂不應宜交則六三之與上六不應也何其不交也以為應失則六三與上六非應也何其亦失也為其近邪則初九之于九四非逺也然則非以近亦非以逺以應亦非以不應各從其所欲隨而已是乃所以為天下隨時非大人不能明擇之也係丈夫失小子言得所係也係丈夫為得所係故隨有求得隨有求得則又可知矣故利貞九四隨有𫉬貞㐫有孚在道以明何咎象曰隨有𫉬其義㐫也有孚在道明功也隨時之義不必隂隨陽而陽亦隨隂然以陽隨隂雖足以有𫉬然亦貞㐫焉雖然陽之隨隂孚足以守道非不能自立而依勢乎人者也明足以趨時非不能自昭而依乎人者也以從初而已何咎之有九五孚于嘉吉象曰孚于嘉吉位正中也君之所期于臣者嘉徳而已故能入告嘉猷出建嘉績為上成假樂之嘉焉九五孚于嘉徳而隨之吉不亦宜乎六二柔順中正盖有嘉績者也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也天下之未隨則係之未可也天下皆隨而獨有不隨者焉故可拘係之拘係之則上窮之勢不能无從矣雖從之非心也以徳維其心則中心悅而誠服文王所以亨于西山用此道也巽下艮上蠱元亨利渉大川先甲三日後甲三日􅂏曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也萬世无弊者道而已事則有弊之所由然以剛上而柔下巽而止故也盖剛上而柔下雷風相與巽而動乃能乆今巽而止則不可乆而蠱弊生矣然窮而變變而通通而乆矣是以蠱弊之既生則欲治之也傳曰道猶金石一調不更事猶琴瑟每終改調此之謂也天下之勢有亂乃有治故乾元用九而天下治蠱元亨而天下治以有亂故有去亂而治之者也蠱以止而生則不可復止又巽者木道也以渉難則蠱飭矣故曰利渉大川也有事然後有功蠱則飭樂而已不足以言功故曰往有事也先甲三日者原弊之所由以生也後甲三日者恐神竒之復化為臭腐也盖終則有始時乃天行則所以圖之不可不要其終而原其始也象曰山下有風蠱君子以振民育徳徳則日新事則日故雖然以日新之徳推之于事則事亦新而不故矣故必有以摇蕩其民如風之落山以育其徳則蠱之不飭而自去矣事末也聖人所以圖之於其本而已故于是育徳焉初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也家人之道恩勝于義故常于巽止而蠱弊之生尤甚于國此六爻之所以皆言幹父之蠱也幹父之蠱則其治可移于官而幹國矣經曰貞者事之幹也事待幹而後立故蠱皆曰幹焉孟子不順乎親不可以為子今曰有子為其巽順幹父之蠱也以巽順而幹蠱而所承非成徳之父則其非道亦從矣今九二以剛中首事得其所以為父故稱考焉初六以巽順承之得其所以為子故稱子雖其所以无咎焉厲而終吉也九二幹母之蠱不可貞象曰幹母之蠱得中道也初六之所承者九二而三四五所承者上九也故稱乎父九二之所承者六五也故稱乎母子也巽乎内而止乎外隂陽大分也故不可以為貞然非失其所居而然也以幹蠱而已又皆得中道是以悔吝不至九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也九二剛中而初六以柔巽從之乃其宜也上九剛過而九三以剛過應之亦其宜也然子道貴順今以剛過則父子之恩傷矣故小有悔然從義不從父是乃所以義其父也故无大咎焉小有悔而已則固无大悔矣无大咎則猶小有咎焉而象曰終无咎以始則傷恩而終于義故也六四裕父之蠱往見吝象曰裕父之蠱往未得也巽而止蠱之所以生也剛所以飭不宜裕矣而六四以柔裕父之蠱所以往見吝也而未得乎親父之於子尊賢而下无能今裕父之蠱而不能飭宜其未得也六五幹父之蠱用譽象曰幹父用譽承以徳也六五所承者剛中之父則巽順以從之可也父若以剛過則子道難矣盖以剛過則傷恩故九三有小悔之辭焉以柔正裕之則害義故六四則有往見吝之辭焉若剛不至于害義卒歸於有譽者六五是也此所謂克諧以孝也瞽瞍之頑則剛過之父也而四岳以烝烝乂不格姦稱之于堯前者亦舜能幹父用譽故耳其曰承以徳何也惟徳足以諧頑嚚其能用譽亦以徳而已此爻惟大舜足以當之若武王能廣文王之聲則文王有聲而武王廣之耳此則父子之懿剛之父如初六吉也上九不事王侯高尚其事象曰不事王侯志可則也經曰蠱者事也以謂徳則常新而事則有蠱也以蠱生于事復有事以幹之則有事亦將蠱矣自道觀之則是以水救水名之曰益多此蠱之終所以貴夫不事王侯高尚其事也事至于王而貴者為公事至于侯而貴者為卿求事王而不賔則求事于侯此求富而不耻執鞭之為也既不事王亦不事侯高尚其事而小天下此其志固不可奪矣是以可則也賁終白賁蠱終于不事王侯則此反素而守静也兌下坤上臨元亨利貞至于八月有㐫􅂏曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有㐫消不乆也上者以高而臨下大者以道長而臨小此臨之義也夫君子之長小人之消也長乘夫隂陽之機而不能自止也故其道之長猶草木之長氣凑于下而視之不見其蠕蠕以進而乆之則高大矣然則君子之長亦何事于躁進哉浸之長斯可矣其消若氷雪之消陽鑠于上則視之不見其駸駸以退而乆之則渙釋矣然則彼小人之消何事以威武臨之哉說而順斯可矣其自進也浸而長其臨人也說而順又其才剛中而應于上是乃所以大亨以正也君子屈而小人伸不可謂亨君子外小人内不可謂正今君子伸而小人屈則亨矣君子内而小人外則正矣亨之與正既見于人事時乃天道故曰大亨以正天之道也既曰天道則消息旡常而正有復為竒善有復為妖故曰至于八月有㐫夫亨之與正必曰天道何謂也盖君子所求亨者求亨其心而已所求正者求正其身而已若夫其道亨其位正則君子歸之天道而不求此所以道言天道也象曰澤上有地臨君子以教思无窮容保民无疆於卦考之觀之道尊而臨之道親尊可以教敬親可以教愛且可以臨民而民莫不戴之為重可以觀民而民以榮觀者莫若教也故臨觀皆以教言焉然觀之為教以順為主故以省方觀民臨之為教以厚為主教思无窮以謂厚者性之徳也修率性之道以為教則其教无窮何則性不壞而道无弊也苟有窮則隘與不恭在所尚矣容民无疆故遠者來保民无疆故近者悅以此厚徳臨下之道也初九咸臨貞吉象曰咸臨貞吉志行正也初九九二皆以陽下隂有男下女之義故皆咸臨然初九未得則君子之道未得也特志行正而已乃若九二未順命則不特志行正而見于事矣九二咸臨吉无不利象曰咸臨吉无不利未順命也柔長則變剛剛長則變柔九二之于六五盖以道而感變之者也六五且又順受而不懼所以吉无不利而象所謂未順命也革之九四言改命臨之九二言未順命其實一也革之九四在上近君者也故曰改命臨之九二在下遠君者也故曰未順命盖君命善則左右之臣潤色之而已君命不善則左右之臣有正教之使善然後布之天下九四所以言改命也此則命未下也命既下而不以善則逺之臣非能之也有所謂未順而已六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也夫道淡乎其无味者也捨此或苦或甘皆非道之長也故苦節不可貞甘臨无攸利夫甘者人之所說以君子之難說非卦之能入也以是臨浸長之剛又奚可哉知其不可而憂之則无咎矣无咎者𥙷過也夕惕若无咎以懼而𥙷其過者也既憂之无咎以憂而𥙷其過者也六四至臨无咎象曰至臨无咎位當也浸長之剛以大臨小以信臨屈將成其上浸而之剛在上者固不能不巽順臨之矣然其巽順不出乎正則雖甘不說也其巽順出乎正則雖不甘亦悅也六四則巽順之出于正者是能至誠順乎剛者也何咎之有哉故曰至臨无咎六五知臨大君之宜吉象曰大君之宜行中之謂也傳曰投隙抵時属乎知所貴乎知者謂其善抵時也方君子道上有向乎㤗而六五能以柔順以臨之不抑其進此善抵者也故曰知臨君者賞罸之所自出制天下短長之命而不患乎剛之不足而所以不足者柔也大君而能用柔則得所宜矣故曰知臨大君之宜象曰行中者剛而能柔則剛柔之中也上六敦臨吉无咎象曰敦臨之吉志在内也上六長人之長者通乎長厚之長者長厚乃能長人故也敦又厚之至則寛裕温柔足以有臨矣君子所以處上而人皆重者為是故也坤下巽上觀盥而不薦有孚顒若􅂏曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣於卦為觀者顯此道以示天下而大者輝光之才也上者高明之位也以輝光之才處高明之位則小而在下者斯仰上矣故于卦為觀觀者顯此道以示天下而天下觀之以化也夫化之可以成也觀感而已以龜之相顧鳩之相視而化則聖人之於為天下固可使觀而化也將使之觀而化則何俟乎鉗鍵而驅率之哉順而巽以輔其自然斯可矣順而巽者道也中正者徳也所貴乎極者謂其可以取中也所貴乎表者謂其可以取正也以中正觀天下是猶建極立表于民上耳其孰有不属目哉夫順而巽則不拂萬物之自然而為偽中正則不􅀝其身不迃其心而為偽亦不為邪則誠之所存以誠存則不待有物以彰之然后見其敬矣孔子曰為禮不敬吾何以觀之哉是則可觀者莫如敬也又曰禘自既灌而往者吾不欲觀之矣盥又先乎灌其敬尤為足觀豈待夫薦而後見哉故曰盥而不薦足以自敬而不待薦則觀之者有孚矣夫人之心火也人貌木也人之心見于貌猶火之見于木故内有孚則外見于貌顒然而静專也貞觀者天地之所以觀萬物也大觀者聖人之所以觀天地故曰觀天之神道而四時不忒言天有以觀萬物而聖人有以觀之也又曰聖人以神道設教而天下服矣言聖人有以觀天下而天下觀之也四時有神道有法先後之可循往反之可期明法也不知披拂主張之為誰者神道也於其神道觀之而不助則其明法協紀而不忒矣故曰觀天之神道而四時不忒矣天之神道則觀而不助可也所以教天下則不能无助矣故曰神道設教以神道設教則行積于此而民得于彼天下不知其所以然而然矣象曰風行地上觀先王以省方觀民設教五方之民各有性也非特五方之民各有性五土之民亦各有宜先王之教將使剛柔緩急各得其性而和味衣服利用便器各得其宜於是省方觀民然後設教焉此順巽之道也初六童觀小人无咎君子吝象曰初六童觀小人道也童无知也无與也小人而有知則必為盗有與則必為黨无知无與乃是小人之福也故曰童觀小人无咎若夫君子則明哲之貴不貴夫庸行翳路也安得旡知乎徳不孤必有鄰安得无與乎故曰君子吝六二闚觀利女貞象曰闚觀女貞亦可醜也聖人仰則觀天俯則觀民觀天則所見大觀民則所見博今六二獨見其應是乃為闚觀則觀小而狹矣是則可醜也於女貞則有從一之徳故利六三觀我生進退象曰觀我生進退未失道也生謂動出于我者草木之生所以盛衰美惡之不同皆係其本而已聖人君子所以動出乎身者不同亦其所養有淺深故也六三之材雖其生不如聖人之道沛然有餘然量進退未失道也荀卿曰忠臣誠然後能受職所以為不窮也其六三之謂乎六四觀國之光利用賔于王象曰觀國之光尚賔也君子之道深其根而時養之則其生也足以窮大極高有進而已無退也若其身之進退則觀乎時而已故曰觀國之光九五得尊位大中以大觀在上國之光者也巽為進退為不果而未純為臣故曰賔然進退不果而上非有王徳之君足以廸知而忱恂則疑其晋逼而害之矣非賔之利也九五王也故六四利用賔焉九五觀我生君子旡咎象曰觀我生觀民也在下者常失于好進好進則誘于前而不復顧矣在上者常失于好勝好勝則過在身而不能自檢矣六三觀我生則非在上不能自明也在下觀我生也此猶有折足之懼而不敢必承也在上者而觀我生則非盛徳孰能若是於是稱君子焉六三進退未過未有以施于民其觀我生則觀諸已而已九五既以加施于民則我生宜觀焉所謂當于民鑑視民知治也上九觀其生君子无咎象曰觀其生志未平也上九處一卦之外无與乎天下者也无與乎天下則吾何蹶厥生哉觀其生而已觀九五之生則其君可知矣觀九三之生則其臣可知矣震下離上噬嗑亨利用獄􅂏曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也上下剛而中虚上止而下動頤之象也九四以剛虚在中頤中有物之象也頤所以養百體也物有間之則害其所以為養故必噬而嗑則有閒者除而上下通得所以自養矣故曰噬嗑而亨然則噬嗑者用刑之卦也用刑之道不剛則无斷制之義不柔則无矜恤之仁有剛有柔又必平而不偏然後為善剛柔分言平而無偏勝也雖然不動不足以發滯伏不明不足以燭暗昧故必動而明夫五刑五用將天討而已則其動必如雷其明必如電然後乃可故曰雷電合而章夫不取于日而取于電者電見于隂而人畏之用刑之道也剛柔言分雷電言合以謂剛則用于未得其情之先柔則用于已得其情之後用剛則不能兼柔用柔則不能兼剛故言分也若夫動與明則不可以相離相離則不可以成章故言合也以二體則剛柔分動而明雷電合而章以六五則柔中而上行如此則雖不當位利用獄矣夫其動也如雷其明也如電則赫赫厥聲濯濯厥靈固足以震耀天下不止利用獄而已惟方不當位故利用獄而已不曰用刑而曰用獄者惟刑至于用甲兵六五利用者小刑而已故曰獄也象曰雷電噬嗑先王以明罰勅法禮禁於未然之前法施於已然之後然後懲之于小而可使无惡於是先王以明罸勅法而人知之不可玩矣盖罸之不順人則以小惡為无傷馴致于大惡而不悛雖勅法有不能勝非所以勅法也初九屨校滅趾无咎象曰屨校滅趾不行也小人之為不善非能以類進也而惟上之人无懲之然後馴致其道大惡成焉蒙曰用脫桎梏以往吝剥曰剥牀以足蔑貞㐫然則屨校滅趾懲不善于􅀄不亦宜乎成周之時萬民之有罪雖未麗乎法者以桎梏而坐諸嘉石則所以懲小人宜早辨矣滅之者絶之道也傳曰去惡莫如盡故稱滅焉六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也噬嗑六爻初九上九受刑者也中四爻皆用刑者也其所以然者何也盖刑之所起原于小人用極至于殘殺者亦以其小人惡積而罪大故也若夫居中用刑則君子而已此六爻之義所以異也膚柔脆而易噬者也六二柔中而能資初九之剛所以利用刑猶噬膚也夫六二既刑初九而反資初九之剛何也夫噬嗑食也食之堅則噬之既噬則資以為養矣君子之噬小人亦若此豈有棄物也哉六三噬腊肉遇毒小吝无咎象曰遇毒位不當也用刑之道必有其才又有其位然後乃可徒有其位而才不足則是士師不能治事也有其才而位不當則是代士師殺人也然是二者位不當猶愈乎才不足才不足則刑不中刑不中則大不服矣此六三所謂噬腊􅁏遇毒不得噬乾胏也腊􅁏之難噬而又遇毒以譬刑小人之不服也腊肉有養人之道不得其養而遇其毒固吝也有其位代司殺者又見應于上是以小吝无咎也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也此所謂有其才而位不當者也有其才故易于六三之噬腊􅁏位不當故難乎六五之噬乾􅁏焉九四與六五皆稱金而九四得金矢六五得黄金何也六五君也制刑者也九四臣也用刑者也制刑付之臣用刑加之民其事雖殊其欲剛而通乎變則一而已夫刑義徳也剛也制刑者通乎變故法令之所設者當焉用刑者通乎變故金矢之所施者當焉是以皆稱金也至于中之見乎色則制者之所貴故六五稱黄黄者中之見乎色也矢者臣而利乎行者也用刑之所貴故九四稱矢矢者直而利乎行也盖制刑之初則欲揆人之情合時之變不可過輕不可過重正諸中而已至于用刑則不然舉夫曲直而推之而已是以不同也六五噬乾􅁏得黄金貞厲无咎象曰貞厲无咎得當也六五得尊位大中不能以道化天下期於无刑而猶用噬所以為噬乾肉而難于噬膚雖貞而厲也然小人有為間之罪可除而我之除間之刑得當故雖厲亦无咎焉上九何校滅耳㐫象曰何校滅耳聰不明也夫刑有金有木而木又有校今初九上九止稱校而已何也噬嗑之道始將勅法非致刑之時故稱校焉金義木仁而校又非若金之傷也仁故也離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下經曰物相雜故曰文卦之所以為賁以柔來而文剛分剛上而文柔物相雜也夫立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂與陽天之所以為文也柔與剛地之所以為文也仁與義人之所以為文也今賁之成卦獨以剛柔為言者剛柔地道而坤介于西南於色為章而文說卦曰坤為文然則道其文之著者乎所以賁有取于剛柔也雖稱地之剛柔則與天之文與人之文舉矣是以下文稱觀乎天文觀乎人文也賁之所以亨以柔來而文剛也所以小利有攸往以分剛上而文柔也柔來文剛者本乎剛而又之柔也在人則是存高明敦大之才而能自損者也是以亨也分剛上而文柔者不中柔而文之以剛也在人則是懦弱罷軟之才而能自強者也是以小利有攸往而已柔來而文剛六二之謂也六二柔者也分剛上而文柔上九之謂也上九剛過者也盖本剛而文之過柔則其柔不必過也中斯可矣本乎柔而文之以剛則剛中不足也必過而後可也是以不同也柔稱來剛稱上者何也往者屈也來者伸也柔之文剛也為亨則是來而信也故來剛之文柔雖不足為亨然亦小利有攸往非往而屈也是以變往而稱上也上六者所謂抗之以高志也剛柔相雜不違乎自然之文此天文也至于人文則于自然之文不能旡違至或過而滅質者有矣是以文明以止然後為人文也禮之有元酒太􅅅樂之有朱弦䟽越盖施止于文明之間也繫辭曰通其變遂成天地之文賁曰觀乎天文以察時變其不同何也變所以成文文成而變見是故通變足以成文觀文足以察變也能察時變然後能觀人文彼三代之禮不相􅆓襲盖察乎時變而然也人固有自然之文㓜而愛親長而敬兄皆是也因其文而章明之潤色之則天下之化旡為而成矣故曰觀乎人文以化成天下也象曰山下有火賁君子以明庶政无敢折獄政以養民為本以明為文以養民為本有山之象以明為文有火之象故山下有火則稱庶政焉而政明之為貴周以夏掌政義取明也庶政明則物以區處事以條利而不至于争其有争則是庶政之未明也是以君子務明庶政也至于獄則无敢折也且賁非以賁也老氏謂兵若羙之是樂殺人今獄而施賁无乃為樂殺人者也初九賁其趾舎車而徒象曰舎車而徒義弗乘也趾在下而能行者也所以自飾莫若乎義而義路也由義路而行賁其趾之象也苟由義路而行則義在乎勞不舎勞而取逸義在于遠不舎遠而取近矣故六二虚中有車之象欲以載初而初舎之弗乘也六二賁其須象曰賁其須與上興也以柔飾上者須也六二柔不自立麗九三而飾之湏之象也然賁以剛柔相雜義雖不能自立而飾物亦未有咎也雖未有咎與上興而已吉亦不足道也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也賁如自飾也濡如二飾之也凡言濡皆相與于不足非相忘于有餘猶所謂相濡以沬者也豈若渙其羣者哉故夬之遇雨若濡則有愠之者賁之賁如濡如則有陵之者惟能永貞不至乎勢傾而絶利窮而散是吉而莫之陵也六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无尤也自飾以正故曰賁如未受飾于物故曰皤如能自飾于正則雖未受飾于物將有飾之者矣故曰白馬翰如初九以剛在下未受飾于物而動以趨上白馬翰如之象也然六四當位非知變者故初九之來則疑其為冦然非冦也婚媾而已冦相賊也婚媾相親也固亦異矣今疑若是則疑之眩惑也甚矣六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也丘園生財者也束帛用財者也於生財則致益于用財則致損強本而節用者也盖六五之才内陽外隂陽為實也隂為虚為損有强本節用之象焉夫賁致飾之卦也致飾則侈靡所由生故六五有賁于丘園束帛戔戔之辭焉然束帛物以為禮也將為禮而戔戔則吝道也以其能强本而非墨子之私憂故終吉象曰六五之吉有喜也為其非私憂天下之不足也上九白賁无咎象曰白賁无咎上得志也傳曰色者白立而五色成焉五色成于白故賁之上九為白賁所謂文明以止也聖人之於人所以藩飾之旡所不至要其歸使之日用飲食而已此終于白賁之意也白者性之質也未染于物之時白賁或賁物之賁而終也能明白太素則清淵不迷矣既彫既琢還反于朴即此意也坤下艮上剥不利有攸往􅂏曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也剥隂剥陽而至爛也魚爛不可復全則君子之于剥止焉以俟可也有攸往則適足以招揭致害不可以逃矣故曰不利有攸往夬則曰剛决柔剥曰柔變剛何謂也夬人事也變天道也君子之于小人直以人事决之耳小人則其人事不足以勝君子盖以天道之逆而徐徐以變之耳故曰柔變剛也剛之長至于五剛其長猶未變也且健以决柔而為剛矣柔之長至于五柔則其長為已極乃将順而止之不使至上行此進陽退隂之義也盖五剛猶盛而一隂始生則逆而制之可也姤之繫金柅是也五剛已盛而一柔未去則健以决之可也夬之揚于王庭是也若乃五柔已盛則逆而制之不可也健而决之亦不可也順以止之斯可矣所以順而止為其有可止之象也故曰順而止之觀象也所謂象也者消息盈虚之象則小人之威知其可以順而去矣盖消必有息盈必有虚以消則必有息以盈則必有虚則陽有來復隂有退聽之理順是而止之則于天豈曰違之哉象曰山附于地剥上以厚下安宅山附于地則下厚而上安也君子於是以厚安宅下之不厚而自安于上則是處焚薪之上坐漏船之中雖火未燃水未及溺固不可以為安矣初六剥牀以足蔑貞㐫象曰剥牀以足以滅下也牀與輿皆人之所恃以為安者也而牀則以夜息輿則晝行夜者隂盛之時晝者陽復之時于其方剥則稱床于上九而復則稱輿辭各有所稱也剥床以足才滅下而已於是時上有以貞之則不能馴致而為剥矣惟上无陽應故㐫既㐫故曰剥床以足蔑貞㐫六二剥牀以辨蔑貞㐫象曰剥牀以辨未有與也辨進于足矣君子之不得安宅甚矣猶曰貞凶何也二隂尚微未至于不利君子貞也君子雖欲正之末如之何矣至若一隂始生則可以有魚包之也二隂浸長則以臣妾畜之也過此以往其凶必矣不特亦滅趾也君子之勝小人猶水勝火然小人已盛而君子之道微則是一輿薪之火杯水不足勝也六三剥之无咎象曰剥之无咎失上下也所剥者君子也剥之者小人也小人得无咎者以失其上下之朋類而應陽故也此所以有與也六二未有與則㐫六三有與則小人之所以為小人惟其異類移之耳所謂相柅而入禍門者也然其自脫于羣邪之中而與君子何咎之有哉六四剥牀以膚凶象曰剥牀以膚切近灾也剥牀以足以辨則危之而已剥牀以膚於是傷之矣所謂䑛糠及米者也於隂之方生與其浸長之時不能有以正之使至于切近則君子之𫝑弱而易傷不足以自捍禦矣於是稱膚焉六五貫魚以宫人寵无不利象曰以宫人寵終无尤也小人能以利養君子然御得其道則潛退而不為用魚之象也六五得尊位大中資為于上九以制衆隂順序而承之貫魚象也夫羣小之在下君子豈比而誅之哉亦御之以道使其若貫魚然則不至于亂而反為吾利矣且以貫魚之道施宫人寵使其順從而不得有為則无不利矣詩言為龍為光所謂為龍言使之升降自如不見制畜也此則待君子之道也若夫待小人與宫人之道則若貫魚可也為龍則害莫大焉故曰貫魚以宫人寵无不利而象曰終无尤也上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也離以柔麗故稱百糓觧以剛動故稱百草上九以剛在上而不剥于隂則又碩果而不食者也夫小人能載君子亦能從君子于其方剥則覆君子而乘上于其已復則載君子而在下上九剥窮上而徑反下也於是君子得輿焉大君子善帡幪其下猶之廬也而小人乃反剥之則是自剥其廬也自剥其廬亦以愚甚何可用哉周易新講義卷三
