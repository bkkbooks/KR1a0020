body:
  text: 周易新講義卷六宋耿南仲撰乾下兌上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也剥曰柔變剛夬曰剛決柔盖小人之于君子人事不足以勝之特以時變之耳君子之于小人則人事足以勝之且其勢順而易若決水然故曰夬決也剛決柔也夬之才健而説者也健故能決説故能和以生道殺民雖死不怨殺者則決而和之謂也上六一柔而乗五剛之上肆狠愎之性而為怙終惡首也其罪盈極而衆著故可揚于王庭暴其罪狀而決之也雖暴其罪于衆未可以遽決又必孚號以告之彼安其危而不孚然後決之則君子之道光矣故曰孚號有厲其危乃光也告自邑言所使告命者不在大也使大國告之則是以威脅非所謂孚號也五剛既盛一柔己窮孚號告自邑則足以致其來務矣而猶即戎焉則非即戎之利也夫以全勝之剛決己窮之柔以形勢强弱論之未應即戎而不利也其所謂不利者剛乃窮矣盖戎事本非聖人之所尚而今所尚在即戎則必窮也且蜂蠆有毒困獸猶鬭庸詎知己窮之柔克之為易而遂以為即戎之利哉植徳莫如滋去惡莫如盡惟去惡之務盡也故一柔窮而猶欲决也惟植徳之欲滋也故五剛已盛而猶利有往也隂始凝而已戒剛既盛而必終則進陽退隂聖人之意可見矣象曰澤上於天夬君子以施禄及下居徳則忌一柔而能乗五剛有怙終之惡則去之亦未易也必五剛協比而後能有功焉然則決小人之功乃衆人之所共致也夫與衆同力而不與衆同徳則衆人之所忌故曰君子施禄及下居徳則忌也初九壯于前趾往不勝為咎象曰不勝而往咎也趾在下而行者也初九有剛健上行之才則壯于前趾者也夫上六之罪雖著有可決之勢亦必位足以勝之然後可往初九在下則其咎必矣故不勝而往咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也上六雖柔而逆乗五剛其勢未易去也五剛方以勝之為事而九二反處柔焉才力不足以勝之故惕懼不已又至于號也如此則隂益盛有莫夜之象焉隂盛則害之所伏故有戎雖隂盛而有戎然我得中道非自我致戎而又衆則方以決之為事則可以勿恤矣故曰有戎勿恤也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也九三剛亢外見頄之象也夫有可以勝隂之位又有可以勝隂之時則沈潛其剛有不克乎九三未離下體未有勝之之位又方與為應未有勝之之時乃剛亢外見失沈潛之理此其所以有凶也然三之有凶在不知夬之道耳其失不在夬也君子知夬之道則以必決為志何凶之有哉故曰君子夬夬惟君子有必決故雖獨行而與者和有遇雨之象其迹若汚而物或愠之然終无咎也九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也初九則位不足勝隂者也九二則才不足以勝隂者也九三方且又與之為應而時未可者也九四其位上達矣語其才則既壯矣又非若九三之勢當屑與之和而乃居隂欲止无往決意則二陽並進而受侵于下有臀无膚之象焉受侵于下則不得已而强行强行非其志也故曰其行次且羊之為物前其壯以獨者也如牽以隨人而前其壯以獨則雖其志猶為夬也故曰牽羊悔亡然九四居隂底滯而暗塞則言不信者也聞言不信則不知牽羊之可以悔亡也九五莧陸夬夬中行无咎象曰中行无咎中未光也莧柔脆之物也陸髙平地也上六之在前猶柔脆易刈之莧在髙平易即之陸无事乎專以剛決為志也而九五純于用剛以必決為事故雖中行无咎而已道未光也舜選于衆舉臯陶不仁者逺矣然則人君欲去不仁无事乎夬也舉賢而已君以舉賢為心臣以去惡為事則君臣之分明矣然則九五夬夬不可見者君之分也九三夬夬而可見者臣之分也上六无號終有凶象曰无號之凶終不可長也上六之罪極矣然夬之道雖決而不失和上六知號咷以憂則君子猶將宥之不至於誅也惟安其危而无號焉是以終有凶夫隂之與陽以進退相反五隂既以變矣而上六終恬不知憂其可以長乎故曰无號之凶終不可長也巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉剛長則變柔柔長則變剛天地自然之理也姤之為卦柔出而遇剛有變剛之志則女之壯者也於初九考之為豕之羸者而今曰女壯何也柔出而遇剛剛亦與遇有婚媾之道焉則是剛之于柔以妻畜之也以妻畜之則為己壯以豕交之則尚為羸盖以妻畜之則小人得以媚上而浸長豕變之則小人祇自見賤而不得行是羸壯不同也女壯而有變之志則終于反目不可與長故曰勿用取女不可與長也夫隂陽相遇天地之理也天道下濟地道上行兩者交通而成和故品物咸章焉使人道相遇亦若天地相遇則功勲之所以成也夫惟遇失其道故隂益進而陽益退而為遯為否至為剥也九五之才以剛遇柔而不失其正得以杞包瓜之道是以天下大行亦猶天地相遇而品物咸章也盡姤之義惟與天地合徳合序然後能之故曰姤之時義大矣哉象曰天下有風姤后以施命誥四方天之于萬物至逺絶也其所以姤之者風也而后之于四方亦逺絶也其所以姤之者命而已天之為風或為明庶之温或為廣莫之寒要之在萬物者神之所為也后之為命或為威責之令或為文誥之詞要之動四方者誠之所為也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也初六柔方長也於是時剛有以制之使柔牽于剛而不得行則不至于為遯矣故繫于金柅貞吉金柅者制柔之物九二之象也无以制之而縱其有攸往則小人道長而見凶矣經曰見乃謂之象見凶未罹乎凶而象凶也所以未罹乎凶者柔方長故也豕者養于人見穢賤者也方待養于人而見穢賤且形尚羸而未壯其志信也蹢躅而躁動矣況其志於為壯乎此小人之長所以不可不戒也九二包有魚无咎不利賓象曰包有魚義不及賓也小人養君子者也制得其道則養君子制失其道則遯而去矣故初六小人也有魚之象焉九二以剛中乗初六能包而有之也包有魚者也夫一民不可以有二君也四自外來是二君也故曰不利賓其不利賓者盖義不及之非擅為己之私分也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也二方据初義不及賓而三乃乗之固位而不去有分民之嫌是以見侵于二有臀无膚之象焉侵則其勢不得不行雖行非其志也故曰其行次且雖曰有厲然非牽于初而不行故无大咎焉九四包无魚起凶象曰无魚之凶逺民也貴以賤為本髙以下為基九四在上體宜得民以為基而逺于初六不能自附于民則髙終逺其民道之宜也然得右命之是特可見於大人相與之際而已若天地不仁以萬物為蒭狗方且與物忘尚何汲汲于保而安右而尊命而正者哉无民者也用静猶可起則凶矣故曰包无魚起凶九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也杞者剛忍之物也九二之象也瓜者柔脆之物也初六之象也人君之于小人欲包而制之亦在用賢而已九五用之以包初善用賢以畜民者也有以杞包瓜則我何為哉含其章美而无所施矣雖曰含章然王言惟命苟含章而廢出命則臣下罔攸禀令矣故又必有隕自天光大而无私應然後乃可九五含章而无應疑于舍命而不能有隕自天者也上九姤其角吝无咎象曰姤其角上窮吝也角者亢上窮也所遇之時至于上窮而剛不知變則吝道也然猶有姤物之志非離羣者是以无咎也坤下兑上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣順以説剛中而應此卦之所以亨也萃所以亨也天下之民愛之則親利之則至致其所惡則散今順以説之則與之所欲而去其所惡也民有不聚乎雖聚而无剛中利衆之才則終亦必離而已矣九五又剛中足以制衆而衆應之是故萃而无攜貳之心焉萃之時以言乎人則四海之歡心得矣以言乎物則九州之美備矣王者所以致孝享于是乎在故曰王假有廟也記曰大孝不匱又曰博施備物可謂不匱矣欲盡其所以為孝在博施備物博施備物非有王徳則不能非有王位則不可九五既有能為之徳又有得為之位所以盡有廟之道而謂之致孝享也夫民不能自正也必有表正者焉上有表正則下有所取正雖衆而不亂故曰利見大人亨聚以正也聖人之制禮興事必隨乎時以時者天命之所在而不可違故也方萃之時物既阜矣民既歸矣物既阜則是天俾聖人備禮之時安得而儉也於是乎用大牲民既歸則是天畀聖人以興事之時安得而已也於是乎有攸往故曰用大牲吉利有攸往順天命也天地之聚以正而非謂物之聚則有正有以正者萬物之聚有以正有以不正此方以類聚吉凶之所以生也故曰觀其聚而天地之情可見矣象曰澤上於地萃君子以除戎器戒不虞弧矢之用生于睽睽之情疑阻而不親故也今既萃聚其情親矣而猶除戎器者以戒不虞也水積則生根食之魚土積則生自宂之獸今物豐而衆民所爭者聚矣則不虞安可不戒哉初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也久相待逺相致聞流言不信者至誠相與者也苟不出乎至誠或有孚而不終則亂乃萃矣亂乃萃則疑阻生焉豈有相待相致之道哉有孚不終乃亂乃萃其咎志在初不在四也以其乃亂乃萃而遂至于號則所報甚小一握貽笑矣苟勿恤而往以終其孚則往无不得何咎之有哉六二引吉无咎孚乃利用禴象曰引吉无咎中未變也桔橰人之所引非引人者故俯仰不得罪于人六二柔正自守不求于五而五引之故吉无咎如此則可用薄祭以交于神而况於人乎盖守中不變非引人者所謂靖恭爾位者也神斯聽之介爾景福矣故曰孚乃利用禴也六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也六三比于九四而未萃者也三之與四雖有剛柔相與之道然非正應求之不得所欲也故曰萃如嗟如无攸利九五雖非正應然得尊位大中衆之所赴也又巽而引納于物則可以得志而无咎也不若正應而得中行故小吝九四大吉无咎象曰大吉无咎位不當也九四不與非應而惟初六之交初六之乃亂乃萃不在我也是以大吉无咎也使當位自處无履柔損之道則志亂之人未易交也故曰大吉无咎位不當也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也天下之來萃成王之孚則宜不有其位以示吾心非富天下也如是衆孚之矣苟有其位則其志未光徒无咎而已衆豈孚哉能永正則亦可以為天下正僅能悔亡耳求以廣業而盡其所以為萃則未也上六齎咨涕洟无咎象曰齎咨涕洟未安上也人之在下宜俟人引而不可以求故初六之號六三之嗟皆不可也上齎咨不已至涕洟而得无咎者在上故也且九五為萃之主而上六乗之苟安于上而不以為憂安得无咎也巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也剛上而柔下剛柔之分也柔而升于上則時焉而已故曰柔以時升其升也必有巽順之道剛中之才而又有見應上之時然後升而亨夫山殺瘦澤増肥水息淵木消支者物惡乎為上也今柔以時升而无巽順之道則其升為陵犯无剛中之才則其升為循縁雖有巽順之道剛中之才而不見應于上則亦不能升雖升而必困故巽而順剛中而應是以大亨也升以進為事而其才又柔順上為志者也以順上為志而不用見大人則其失言亦將由之矣其過行亦將隨之矣用見大人以順上為志所謂事聖君有聽從无諫爭也何疑之有哉故曰用見大人勿恤有慶也南征吉動而趍明也君子静則向晦動則趍明動不趍于明則㝠行而已往則觸機蹈穽故必能南征然後吉也象曰地中生木升君子以順徳積小以髙大地中以順而進自乎毫毛至于合抱故順徳積小以成髙大君子之進徳也其學有時其入有序因其時循其序不躐等不先時優游委蛇循循以進故能自可欲之善積至于不可知之神莫之能禦也初六允升大吉象曰允升大吉上合志也九二以剛中之才見應于上而升升之有喜也初六信而從以升而見大人者也盖得所附是以大吉也九二孚乃利用禴无咎象曰九二之孚有喜也升自下而交于上苟不出于至誠未有能獲于上者九二之孚可用薄祭以交于鬼神則其誠至矣是以无咎象曰謂之有喜也盖人神一道也能事人然後能事神九二孚乃利用禴可謂能事神矣於事人也何有九三升虚邑象曰升虚邑无所疑也此湯武之升也才雖剛過而道不失順天人其交歸矣是以其升若升虚邑前无為之難者也邑之小固不足以阨其衝而又虚焉則其升甚易也六四王用亨于岐山吉无咎象曰王用亨于岐山順事也此文王之升也下有所事時未可以升則順以事上用是故能亨于所國之岐山焉升之為道視地中之木而已木可以極髙大之理然方起于毫末而求為髙大則助長為害矣故文王不得先時而武王不能後時也六五貞吉升階象曰貞吉升階大得志也階者平易而有等以漸升而得位者也舜禹之事聖人之所欲也湯武之事豈聖人之所欲哉故升階為大得志焉夫聖人之志必至于是而後為得志歟孟子曰中天下而立定四海之民君子樂之樂之者樂行道也謂之大得志亦以所樂在此耳上六㝠升利于不息之貞象曰㝠升在上消不富也升至于㝠則極矣㝠而猶升其升必困此舜所以辭耄期也若施于進徳則利故利于不息之正盖進徳惡夫畫也𡨕升不息則窮髙極逺而至深厚終乎為聖人矣利莫大焉坎下兌上困亨貞大人吉无咎有言不信彖曰困剛揜也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也二卦之剛皆揜于柔矣剛有健行之才而无所施此所以為困也君子雖无所施其无所不裕者固自若也且危而遂顛險而遂陷則无事乎有徳矣故險而説困而不失其所亨其唯君子乎險者人之所憂而困者動而見窒者也今險以説則是心有以自説而不以天下之憂為憂者也困而不失其所亨則是身有以自亨而不以天下之窒為窒者也非君子而能若是乎君子雖險以説然陷於險而不得免者雖困而不失其所亨然揜于困而无所逃也如是則逺害避咎之際不能不失其正能不失其正而履險居危如居安者大人而已故曰大人吉以剛中也剛則健行而不陷中則强立而不倚以此處困故正不失也兌為口舌而在上體有尚口之象且人之未信則忠諫以為厲已况羣小之盛欲揜君子而欲以辨説自解乎欲以辨説自解益足以致困故曰有言不信尚口乃窮也象曰澤无水困君子以致命遂志澤有水則足以及物澤无水則非徒利不足以及物而已且无以利其身故其象則為困君子之道足以通天地亨萬物而况其身乎以君子而无所逃困則命也非力之能争也於是君子以致命遂志致命而不致力則志自遂矣所以險以説困而不失其亨也初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也在下而无能為者臀也初六之象也木有庇下之道茂其枝葉而徒有株焉則不能庇其下矣九四困于九二而不能庇初六既无能為之才而所應又无庇下之道此非所困而困焉處坎險之底而體暗下之性則入于幽谷者也進則困于株木而不見庇退又入于幽谷而不得達此困而失其所亨者也是過三嵗則必出而覿明也九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也九五中正在上有需于酒食之才方困于劓刖施不得以及下而九二不得所需焉則困于酒食者也然九五乃徐有説理不終困方將來而應二故曰朱紱方來朱紱者天子之所以飾下者也朱紱雖有飾下之象異乎株木无庇下之才然能飾乎身而无所加乎人以其尚處困故也亨祀者人臣之所以事宗廟也祭祀者天子之所以事百神也臣得君然後能保宗廟故九二朱紱方來則利用亨祀也君得臣然後能爭百神故九五困于朱紱乃徐有説則利用祭祀也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乗剛也入于其宫不見其妻不祥也石止而不動上六也蒺藜剛而善傷九二也且以困而視夫蹇與坎難尤甚焉則是困者難之極也物極必反故困不能久若初六闇下猶三嵗不覿焉是以得其所困與非所困而困固有辨也困不足責也所困也以困之既終則復得酒食之養也乃若困于石則非所困而困焉者也以困之既終則亦頑然不動猶若困之初也上既困于石非所困而困又據于蒺藜非所據而據名辱身危自底于滅不祥莫甚焉妻固所有之妻猶不見况非其應乎九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九四所志在應初而九二為之難不敢亟犯以進也故曰來徐徐盖九二有朱紱方來之勢而九五有乃徐有説之理假少頃則二自應五弗復為初九之難矣九四所以來徐徐而俟之也金車謂九二也夫金剛而能變能變明非牽于初者也車方以載上載上則非比下者也九二之才如此而四反畏之徐徐不敢進所以為吝也所以有終者為其有與不終為物奪也九五劓則困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也上見揜于柔而害其通故稱劓下見陵于剛而害其行故稱刖則赤紱者人臣之所以飾下也謂九二也九二自賁其身又且飾下而不應上故曰困于赤紱也九五上見揜于柔下見陵于剛則與六三進而困于石退而據于蒺藜亦无以異也而九五乃徐有説者以九五中直故也盖中立而不倚其身直行而不迃其心則雖不得乎明必得其幽雖不利乎先必利乎後此同人九五所以先號咷後笑而困之九五所以乃徐有説也有説則九二來應而得臣矣得臣故利用祭祀何則尊上帝在乎籲俊故也籲俊乃可以尊上帝况百神乎宜其祭祀而受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上六牽于初困于葛藟者也乗于五剛困于臲卼者也初柔不可牽則逺之可也五剛不可乗則去之可也此困之終有自通之路可以行而求吉之時若自為謀曰動而有悔則有悔必矣其所以自謀如此而不礙于行者以不豫決隂之性故也巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也井之為卦巽下而坎上巽乎水而上水卦之所以為井也井譬則性也君子學以修性則巽乎水之象也既盡性矣而推之以及物則上水之象也井之為卦甃之渫之以養其源則汲之而不窮人之性知所以養之則動而愈出亦猶井而已矣故井養而不窮也養源于内而用之不窮則衆共資之以為生利之以為説故邑可改也遷都改邑重事也邑可改而井不可改者立本之有地也剛中者天徳之盛也天命之謂性則剛中之徳固其所性之中矣以是立本故不可改亦猶天之不可變也傳曰聖人外化而内不化改邑所謂外化也不改井所謂内不化也外化所以趍時内不化所以立本也故徳之地而不可改則孟子所謂分定是也分定則窮居不損何喪之有盛行不加何得之有故曰无喪无得也无得喪于其心故往者取之來者取之取舍不同而吾之為井一也故曰往來井井九二巽乎水而在中汔至者也然未出則未繘井者也无應乎上則羸其瓶者也井以上出為功今未繘井而羸其瓶是以凶也象曰木上有水井君子以勞民勸相不改井者言性也井道不可不革者言治性也性治而後善則必以五教率天下而性其逸惰之民故曰勞民民勞則善心生矣然民之勞也有欲為之志而无能為之才者有矣有能為之才而无欲為之志者有矣无欲為之志則君子勸之勸之則知勉矣无能為之才則君子相之相則有成矣初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也初六以隂在下而上无應以引之井泥不食者也禽之于井无澤无禽向之則井道廢矣然則其不食非特不如九三之不食也乃為時之所舍者也夫井有不窮之用可以應无方之求苟不可以應无方之求則是其養之未至也故井道必期于食食之然後井之功成焉若夫既可食矣而不見食則命也吾无喪焉九三之不食是矣九二井谷射鮒甕敝漏象曰井谷射鮒无與也井谷者旁出而下流者也射鮒小物在下者也稱甕則既汲而上矣敝則漏自上趍下而井之井亡焉盖中人者可導而在下者也九二在中而不正其自守不固矣上有與以引之則上達无與以引之則下達故有谷射鮒魚甕敝漏之象而孔子謂之无與也九三井渫不食為我心惻可用汲王明竝受其福象曰井渫不食行惻也求王明受福也九三陽也故為井渫下也故為不食井渫可食而不食故或者為我心惻焉人為我惻而我未嘗惻所謂人不知而不愠故可用汲也若其不為人惻則是所謂時者也不可用汲也雖為人惻而我亦自惻則又非所謂无喪无得者也亦不可用汲也有可用汲之才而王明焉則已與王並受其福矣盖井渫而不食則是不為時所知者也王之不明而徇一時之好惡則无由汲矣故九三求王明非明則不合也君聖臣賢天下之盛福况君臣乎並受其福明矣六四井甃无咎象曰井甃无咎脩井也六四在上宜以動出為功者也而以隂居隂乃反静焉然静而正得脩井之道故无咎也夫務在利人而以動出為事者必其在我者既裕也在我者未裕而務在利人則其涸也可立而待也六四知其不裕静而正以自脩焉則其静也乃所以為動出者何咎之有哉九五井冽寒泉食象曰寒泉之食中正也冽之為言清也井渫者渫而後清井冽則自清也故井渫譬其脩性井冽譬其盡性也其井冽其泉寒又在上而食焉此聖人盡已之性而推之以及物者也象曰中正也人之性本中正然徒以失中而偏失正而邪故不善耳聖人盡性豈有他哉不失其所受之中正而已矣上六井收勿幕有孚无吉象曰元吉在上大成也此井道之大成也井道大成宜以不窮之用應无方之求故曰勿幕隂之性故有勿幕之戒焉井道大成而幕則是有周公之才之美而使吝也離下兌上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉傳曰因者君之綱也君以因為綱則疑若廢革然所謂革者因在其中矣盖當其可革而革則亦因之謂也革不廢因故因形者為化存質者為革也金之從革也質存焉楊子以革化並言之是也革之為道可息則息之如水火之相息可服則服之如二女不同居盖亦不廢因之謂也雖不廢因然革生以為熟革剛以為柔革柔以為剛既以為剛既以去其故矣則人為求舊之情不能无危疑而不安者惟聖人盡革之道而功利見于世是以已日乃孚也文明故能革陋以為華説故能革倦以為樂文明者禮也説者義也以禮義為革故能大亨以正則革而當矣是變亂之悔亡焉天地不革而四時不成則湯武之于革命豈得已哉順天應人而已人之于天逆之則凶其於人也違之則怒不順乎天不順乎人固不可以立于世何必聖人而然哉其説以謂心非貴黄屋而富天下也順天而不敢逆也應人而不敢違也夫天命之難諶而知所以順之人心之難察而知所以應之此則非大人不足以與此象曰澤中有火革君子以治歴明時天地革而四時成其革也又有數存焉治歴以推其數而時之消息明矣敬以授人所以理天地而為革也初九鞏用黄牛之革象曰鞏用黄牛不可以有為也人之有文明之才而體炎上之性則必喜以功業自見乎時君子所欲也然上无其應不可以有為則以中順自固其志待上革而後可不然動而見括无益于革也六二已日乃革之征吉无咎象曰已日革之行有嘉也已日乃孚言革之功已日乃革言革之事革之功則君所專革之事則臣所與然而革之事反常而為經非君之則不可以先事故六二雖見應于上而有可為之勢亦以已日然后革也革道貴剛而二柔順必征然後吉无咎征者所謂跂而及之也九三征凶貞厲革言三就有孚象曰革言三就又何之矣剛過乎中故征凶正厲然剛不失正以之革物則物之從之者衆矣故曰革言三就有孚夫以言為革未若不待言而革者然人不可以言教令使而今以言為革物多從之則必信有在于言前誠有在于令外者也不則徒以言為革何足令哉九四悔亡有孚改命吉象曰改命之吉信志也九四雖不當位而无私與故悔亡悔亡則上信之矣故有孚夫自立于无過之地上又至誠勿貳而與之則非徒可以革下而已上命之不善亦可以改矣傳曰從道不從君此之謂也所惡于革而不當也何嫌之有是以君有革命臣有改命而不疑也九五大人虎變未占有孚象曰大人虎變其文炳也剛中大人之才也以剛革有虎變之象焉傳曰通其變遂成天地之文大人從事于變則天地之文成矣是以其文炳然而盛也大人之為革也革不以言不以言而以道故天下自革也革不以面而以心是以其孚見於未占不待已日也已日乃孚為革者之所同也未占有孚大人之所獨也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也上六豹者其文之蔚然而茂密者也君子通變而成制作之文其蔚宻矣而不若大人之文明盛如虎也故曰君子豹變矣茂末則本衰文盛則質喪君子之文至于茂宻如豹可謂盛矣是以其化淺其功顯徒能使小人革面而非心服也象曰順以從君者以謂民之從君乃其分耳非果囬心而向道也巽下離上鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨二體有以木巽火之象此卦之所以為鼎也鼎象也者象未効乎法者也有其兆而已盖鼎雖成象必待木火然後成功猶之聖人必待衆賢之輔然後成化養之功焉鼎之為卦以爻觀之既有鼎之象以二體觀之又以木有巽火之義是有聖人之才而有功發其才者也故其精意可以享上帝其盛禮可以養聖賢也傳曰惟聖人為能享上帝聖人所以能享上帝非徒以精意而已亦以其能籲俊而使之尊上帝也傳曰君之仁者善養士人君所以能養士非徒以備禮而已亦以其專舉賢而使之恵疇也鼎必待木巽火而後成烹飪之功聖人必待賢佐然後能享上帝而養聖賢是以鼎之所貴在乎巽而耳目聰明柔進而上行得中而應乎剛也盖能巽而下賢又聰而善聽明而善視且得中而應剛非如違者如此則於用賢之道盡矣是以元亨也象曰木上有火鼎君子以正位凝命鼎則聖人之才大方輔佐之功焉言木上有火所及輔佐也故曰君子以正位凝命言需賢以自輔如此也位有上下命有多寡正位凝命用賢有序矣初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以從貴也鼎下實也而初六以虚在下則鼎之顛趾也鼎而顛趾以出否則利矣不然則為覆餗矣夫鼎以取新必先出否得超變之宜故為未悖也妾以其子有母道焉宜其在上而今在下是子貴而母賤得妾以其子者也出否以從貴革故以取新非知權不足以與此九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也井言性故其出无窮鼎言才故所受者有量過其量則覆餗矣九二以陽居隂而在中此鼎之有實而顛者也適中則其所之而不可以有它矣我仇謂六五也六五所應也而稱仇以其來即則非嘉稱故也六五困于九四之間有疾者也有疾而不能我即則我之所受適當其可是以終无尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也九三所應在卦之外鉉之象也所應者為鉉則九三為鼎耳矣以耳之于鉉虚而受之則足以舉鼎而行焉今九三以陽處陽實而不受則鼎耳之義革矣鼎耳革而无虚受之義將錯諸地而无以自舉矣是其行塞者也如此則雖有文明膏澤之才不用也故曰不食召而齊魯不能致者二人盖此類也雖然九三巽不失正也巽非髙亢而正非矯激也不遇於今不遇於後故曰方雨雨則隂陽和而雉膏食矣故悔虧焉然不能亡者執一廢百未可與權故也保常守正是以終吉也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也鼎之所受適則有量適中斯可矣以九四實而不中則是實有餘而量不足故有折足之患焉折足則覆餗則其形渥矣誠能孚然後敢受職此臣之信如何哉六五鼎黄耳金鉉利貞象曰鼎黄耳中以為實也六五居中而受九二者也中而能有受則鼎黄耳之象也九二以剛中而應六五者也剛而應之耳之所受則金鉉之象也虚中以資納于物而得金鉉焉則其行不塞其應无方享帝養賢之道于是極矣上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也鼎者才也所以舉鼎則在鉉所以用才則在道在鼎而无鉉是有才而未聞道也而道體常而盡變其盡變也如金六五所謂金鉉是也其體常也如玉上九所謂玉鉉是也金則剛柔无常玉剛柔節矣此利用之終而歸于崇徳也大吉无不利宜矣震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也上者陽之所也陽在下則起而之其所起而之其所也以時焉是以亨也然吉凶悔吝生乎動故人之情動則恐息則説震所以為動又為恐而兌所以為息又為説也然動而知恐乃所以為无恐也故曰震來虩虩恐致福也來自反之辭也欲起而无悔必來而自省也恐懼則致福也故震來虩虩於其先必笑言啞啞於其後凡此者常則不能違也有則云者詩所謂如幾如式者言如其式所闕周易新講義卷六
