body:
  text: 周易新講義卷一宋耿南仲撰乾下乾上乾元亨利貞天地者形也隂陽者氣也即天地之形隂陽之氣而密為鼓舞於其間使其形有闔闢氣有噓吹以成變化之功者乾坤是也故天地譬則形體乾坤譬則精神矣夫易無體也無體則無出無藏無出無藏其所以藏以乾坤為之藴而已其所以出以乾坤為之門而已故卦始於乾坤而乾者道也元亨利貞者德也蓋立天之道曰隂與陽有少陽有老陽有少隂有老隂少陽之純於春為元老陽之熙於夏為亨少隂之斂於秋為利老隂之凝於冬為貞萬物之為元也資氣而已其於亨則流形焉至於利則質成焉氣形質其終復歸根者貞也元亨利貞在天為春夏秋冬之時在人為仁義禮智之性初九潛龍勿用易為六爻以初上原其本末而中爻以二三四五乘之言初以有終也言上以有下也初終言乎其時上下言乎其位以二三四五乘之則言乎其數數有衍耗位有常忒而時又為消息盈虛於其間此六爻之變所以不窮也龍天類也飛躍而親上者也其所以潛則非若馬之以維縶而不得逞也時焉而已時不可以有為則雖有飛躍之才斯亦勿用而已九二見龍在田利見大人非徒處也且藏於深渺之謂潛非徒出也有以自昭之謂見龍之潛也是以能得其身之所利今見而在地豈其身之所利哉乃人之所利故稱為田焉田者人之所利也乾之稱龍况聖人也聖人雖處人所利之時而利不在已然而亦有利焉見大人其所利也利見大人非為可以利吾身利吾家也為其可以得志而成天下之大利耳九三君子終日乾乾夕惕若厲無咎九三之義可進而至可止而終進止之間一毫之差不容也可謂危矣君子所宜進德修業之時於是終日乾乾夕惕若也知終日乾乾夕猶惕若則雖危無咎矣君子朝以聽政晝以待問夕以修令夜以安身自朝至夕皆君子所有事也至於夜則君子不以憂勤故撓焉何則以夜氣近本故也孟子謂夜氣不足以存惡喪本也故於惕若稱夕而已九四或躍在淵無咎九陽也主健故言或躍四隂也主退故言在淵進退合乎天時故無咎潛見躍飛皆言龍而九三則以君子言之九四則以或躍在淵言之獨不言龍何也龍君德也九三雖有可至之道然有可終之義九四雖有或躍之𫝑然有在淵之理未純君德也故不稱龍焉就是二者言之則九四乾道革矣有必飛之勢無或終之義雖未終乎為君之事備猶舜之居攝之時也故以龍言焉或躍在淵豈非龍事乎乃若𥘉九九二之言龍則遠君而旡嫌且言在下不害有君德也九五飛龍在天利見大人位以上為過而以下為順天德不可為首故以下為順而稱飛龍焉在天不可以階而升也必曰飛飛而升然後可至是故匹夫而有天下德必若舜禹而後可也惟君非臣不治惟臣非君不伸然則二五之相利見其勢然也九二出潛而見則有欲上之意九五飛而不亢則有欲下之意蓋大人相利見者也上九亢龍有悔用九見羣龍無首吉隂陽之運積息而成盈盈則反消積消而成虛虛則反息此自然之機而天且不違而上九知進而不知退知存而不知亡知得而不知喪是乃所以自悔也悔吝小疵也吉凶則大矣上九雖窮上然未反下反下而二隂生焉始有凶若臨所謂至於八月有凶蓋言二隂之遁也然則上九特有悔而已悔既小疵又有悔之辭則變而趨吉也是以貴夫用九上遁九者陽數善變用九則退而能下見羣龍不自為首矣不為首則不止悔亡而更吉也以其知幾故也為臣則欲致一故渙其羣則吉欲承上故比之無首則凶君則異於是見羣龍旡首則吉矣彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧聖人之作易仰以觀乎象俯以察乎情而天人之理備矣繫辭曰彖者言乎象者也又曰爻彖以情言言乎象又以情言則易備於俯仰之間故觀其彖辭則思過半過半則未及盡者以言象而未及器言器而未及情言情而未及文也大哉乾乎言乾之大也大哉乾元則言元而已元亨利貞四者皆大蓋四者更相用事用事者主之則大矣特言萬物之資始故曰大哉乾元而已乾知大始而元者又四德之始故萬物於此資始焉資始者孕精於窈冥之𥘉而未有形也乾元為萬物資始如元首之在上故能統天者會衆體而舉於上也此舉彼從無事乎擾擾故雲行雨施未嘗雕刻而品物流形焉大明終始不必敘正而六位時成焉又能時乘六龍以御天也執八統以馭萬民則民雖衆多而其分不可亂乘六龍以御天則天雖變化而其終始不可亂也萬物自資始而至流形則有始有終矣有始有終則物各成物而六爻自初而至上亦若此而已故大明終始六位之爻所以時成也然動物之終始首尾是也植物之終始本標是也如動物之有首尾植物之有本標則始不可以為終終不可以為始矣而乾則不然終而復始不窮如環也故既言六位之定列又言六龍之變焉龍之在天其消息盈虛其進有序其行有節而天弗能違此乾元所以御天也六龍之在人其潛見躍飛其進有序其行有節而天亦弗能違此聖人所以御天也乘六龍以御天則乾道之變化兆矣乾道之變化異乎人事之云為人事之云為則以言諭力致所以正物非物自正也乾道變化則無言諭力致之事宜運於自然而萬物之性命各正矣且比夫天下之物擾而正之則各安其地莫知正處各甘其食莫知正味將以孰為正哉用各隨其分則物物有正處物物有正味長短小大各遂其宜所謂各正性命也各正性命則物殊稟雖物殊稟然而一陶乎太和之中無外是者焉蓋通於天地是謂太和散於萬物是謂委和委和之與太和嘗通流而無間故人一體之盈虛嘗通於天地也惟萬物自委和人而不能保合故不能與天地同流而壅塞生焉保和所謂保汝之保蓋盛德者人之所保也太和者物之所保也知保於太和而不離則札瘥疵癘不生而物各適其性可不謂利貞者哉功歸於利貞此乾所以首出庶物之上而使萬物咸寧也首出庶物當言萬物咸寧而言萬國何也乾道即君道也上以天位言下以人事言蓋互見也猶所謂乾以君言也象曰天行健君子以自強不息經曰立象以盡意又曰象事知器由象以觀妙則可以知意由象以觀微則可以知器隨其所觀之淺深而已夫易者象而已故卦亦象也所謂八卦以象告是也彖亦象也所謂彖者言乎象者也爻亦象也如潛龍履霜之類是也若夫合此二體正名天地雷風水火山澤者也其為象則惟天行健地𫝑坤之類而已故特比類以為象稱焉君子之於天無所不法法之以為修身之要者健而已故七德之中獨法其健且力分之外不可強欲強則雖勇於必用且拂而逆理矣彼君子之自強法天之行健而已則其強非力分之外也非力分之外故能久而不息也魏氏之卒年闕東野之馬三日而失者以求之力分之外故也其強在力分之內而猶息則志不篤而已是以君子惡乎畫也潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也龍者變化有為之才也所以勿用在下故也曰陽在下者蓋以龍之飛潛升降本乎自然之機非樂潛而惡飛也德施普與德博而化異德施普言德澤也利而大德博而化言德風也有易俗之道焉田者利養之地故言德施而已後言龍德而正中故言德博而化旋而未至為反已至為復九三之為爻知至而至之則三為未至知終而終之則三為已至稱反復焉若反為道復為非則君子去復而取反可也無為終日乾乾而至於夕惕也進而可與幾止而可與存義反復莫非道也是以君子去取之際慎思而審擇之至是形勞而心惕也九四乾道以革有必進之理矣其所以在淵非特退也以退為進耳以退為進而不鋭於進所以進而無咎也物以類則相召然不屈體以交物則未有能召其類者故亢龍在上則知賢人無輔也況大人乎飛龍順下則大人造焉况賢人乎經曰天地盈虛與時消息蓋盈則與時消而反於虛虛則與時息而復乎盈盈虛相尋間不容髮何可久也而上九知進不知退知存不知亡所以有悔也天位則首出庶物矣德不可為首天位不可為首則失己天德不可為首則失人文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞孟子曰説詩者不以文害辭不以辭害志蓋道志而為辭修辭而為文也然則聖人之於易既繫之辭而又有文言者辭以盡言文以盡辭也諸卦皆以辭盡言而乾坤又以文盡辭者也乾坤易之藴不如是不足以闡幽而發微也元亨利貞在人莫非善也而元為人之尊爵也故曰元者善之長也人者天地之德隂陽之交鬼神之會五行之秀氣然則天地之大美萬物之衆盛廣大兼有於所性之中矣其或會于中或散於外在其心之亨塞而已其心亨則衆美會而為充實之美其心塞則衆美散而為罔生之民孟子有泉逹之喻而又有茅塞之况者蓋欲亨其心也故曰亨嘉之會也仁圓而義方故守義者常執而不奪介而不通有殺身者焉知屈信相感之理則可謂有利而其為義也和矣故曰利者義之和也物之生有華藻有質幹質幹譬則性也華藻譬則事也華藻之本於質幹猶事之本於性者也貞者性也故貞者事之幹也元者善之長也故君子體仁足以長人體不備君子謂之不成人體者言其體而已蓋仁數之多溫良者仁之本敬慎者仁之地寬裕者仁之作遜接者仁之能取數之多無不備乃謂之體仁體仁則在上而人不惡在前而物不害故足以長人也何謂嘉會足以合禮傳曰動容周旋中禮盛德之至也夫衆美會於一身而充實則德可謂盛矣動而與合則弸中而彪外耳故曰嘉會足以合禮何謂利物足以和義義者天下之制也所以制者所以制物者也或行儉以節或用健以夬者皆義也以利物之德而行制物之義則行儉以節而不失其説用健以夬而不失其和既使勞而不怨又使死而不怨焉故曰利物足以和義何謂貞固足以幹事經以蠱為事以事易壞故也事易壞而性不變故稱貞固焉惟不壞者乃以為易壞者之幹觀物之華藻質幹則知之矣故曰貞固足以幹事元亨利貞則仁義禮智也上言體仁合禮和義而不言智何也智於五行為水水性隱伏故人之用智常於沉潛不測之間此所以不言智之意與君子行此四德者故曰乾元亨利貞何謂也傳曰天地有大美而不言夫元亨利貞之四德蓋乾之大德也有大美而不言則元亨利貞之名有不著矣惟君子法天而行此四德者可見也則元亨利貞之名由德而著故以謂君子行此四德者故曰乾元亨利貞也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也聖人外化而內不化以飛躍之才屈而從之是外化也不易乎世是內不化也九二之稱善世蓋聖人之見也其未見而潛則不易乎世不為世所易而俗之所好已獨損之俗之所嫉已獨取之是以與之易寡而不成乎名焉聖人不以善世為有德故善世而不伐不以遁世為有喪故遁世而無悶不成乎名則無譽而已不見是則有毁之者焉有毁之者而無悶何也蓋聖人未出而善世則所謂世者汙世而已不見是於汙世則必與汙世違者不見非於汙世則必與汙世合者與汙世合而不見非乃所以為非與汙世違而不見是乃所以為是也又何悶之有哉聖人逹則憂以天下樂以天下其窮也憂樂徇我而已故樂則行之憂則違之所謂獨居而樂獨思而憂是憂樂行違不以天下而徇我則非其心不違矣夫口可教而使言默形可劫而使屈伸惟心不可使易意然則紛紛者又惡足拔其心之所不為者哉故曰確乎其不可拔潛龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也聖人以中正為德以變化為道在上如龍之在天則變化代興在下如龍之在田則正中是守而已故曰龍德而正中也言正則無擇行中則無爽以中正達於言行故庸言信庸行謹也言行必稱庸者以龍德故也夫言行君子之所以動天地也言行所以能動天地以發於至誠而已繫辭言於中孚九二者為此也然則庸言雖信庸行雖謹又必間邪存其誠善世而不伐者也必間邪存誠者猶育獸之驅豺狼育魚之祭猵獺也言行發至誠而天地為動而况於人乎故繼之以善世之功革惡俗以為美俗化悍民以為逸民也其功亦大矣而聖人之心以為教化者吾所職也善世則吾職當治耳何足矜哉是以不伐也聖人之德潛則淵泉如淵見則溥博如天不可窮也故九二曰德博而化也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣君子之於德業不待至於九三九四而後進且修也以謂九三有可終之理九四有或躍之勢則尤宜修人事以副天命之時故以進德修業稱焉忠者不欺之謂信者不疑之謂不欺則有充塞之實不疑則居之安矣所以能進德傳曰言以出信又曰文以足言然則信待言而後出言待文而後足也故君子欲立其誠則其於辭也必加修焉修辭而誠立斯可以為忠信故曰修辭立其誠凡物立之則見化之則隱立其誠於民上若標表然後使民觀而化斯可以居業矣蓋馬駭輿君子不安輿庶人駭政則君子不安政不安政非所以居業也故必立其誠使民信之而無危疑之心則無駭政之病然後能居業也知九三之可至而至之則先見者也故可與幾知九三之可終而終之則守固者也故可與存義居上而驕則必暇逸而乾乾則是居上不驕也在下不憂則惕非因時也不樂居卑耳今因其時而惕則是在下位而不憂也安其危則冝有咎乾夕惕則非安其危者也焉得有咎哉故曰雖危無咎九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎六爻或稱六位或稱六龍位則有上下龍有進退故於是言上下又言進退也九四上不在天下不在田是上下無常也或躍而進或退而在淵是進退無常也上下宜有定處今上下無常則疑於為邪者也進退宜有常度今進退無常則疑於離羣者也所以上下無常而非為邪於身進退無常而非離羣於人者以君子進德修業不失時故也九三進德修業九四又申言猶書所謂申勸寧王之德是也上帝勸文王之德舊矣至其將集大命又申勸之與此合矣傳曰聖人非能違時時至則能弗失也時至而德之不進業之不修失機會矣得旡咎哉故君子進德修業欲及時也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也聖人所至必以類至者固非利誘而勢驅之亦非出於招來扳舉之力也其感召出於自然故於二五之相利見以聲氣水火雲龍風虎自然之象言焉同聲相應非若言之劫而至也水流濕自上而流下也火就燥自下而就上也雲從龍自下從上也風從虎自上流下也而上下之變相利見也夫聖人之作如揭日月其誰不覩哉九二作而天下文明九五作而位乎天德則萬物所同覩也覩之則從而親之必其本同然後親焉萬物之生有上首者有下首者此其本固不同矣人亦若是本乎天者親上本乎地者親下衆人之相求本乎下者也聖人之相求本乎上者也其曰本乎天者親上非必二從五也五之從二亦是也孟子曰聖人之於天道凡以天道相親者皆本乎天者而親上者也非必以其位之上下也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也九五位乎天德矣而上九過之是貴而無位也九五則大人造也大人造則是天下之父歸之民則子來矣而上九過之是高而無民也天位失而不存民散而不保雖有強力孰能輔哉是以賢人在下位而兀輔也夫賢者為之輔則雖涉難可也故大畜尚賢止健則利涉大川今賢人在下位而無輔則動而有悔不亦宜乎潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也此釋初九九二其終與井卦初六之象同井之初六曰井泥不食下也舊井無禽時舍也此曰潛龍勿用下也見龍在田時舍也其辭雖同其志則異不當以辭害志也井之所以不食以其下也龍之所以勿用亦以其下也然以井之稱下則語其性潛龍稱下以時勢然也井之無禽則時舍也龍之在田亦時舍之然而井之時舍則語其德見龍時舍則見天命然也所謂時舍者歌謳獄訟不歸而已又九五在上萬物覩焉則九二雖有君德歌謳獄訟不歸矣謂之時舍不亦宜乎終日乾乾必有事焉非徒勞也故曰行事也或躍在淵以自試非果或也故曰自試也上治者居上以治也天曰災人曰眚天道虧盈而上九時而盈之則災斯至矣故曰窮之災也經曰終止則亂又曰窮則變變則通失終則亂窮而變通理之自然也故乾元用九天下治也用九言變也傳曰九變也復變而屬一此之謂也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則此潛龍勿用下也至乾元用九天下治也輔嗣謂以天氣明之其説是也稽之於人事而人事同驗之於天氣而天氣同此聖人之出處所以天人弗能違也以其利澤萬物則為龍以其發育萬物則為陽氣初九在下則陽氣潛藏之時也物合則成體散則成章見龍在田而天下文明則散而成章之謂也聖人樂天則不動其心所以終日乾乾者與時偕行而已九四去下卦而與上同體故曰乾道乃革九五尊位大中也故曰乃位乎天德不曰天位而曰天德者天之德惟九五為能備也且天之德高明溥博變化不測豈人臣而能體哉於九四稱乾道於九五稱天德者四欲躍上故以極高明者稱之五欲飛而下故以道中庸者稱之也上九與時偕極之時至是而不知極猶進而不已悔斯至矣聖人與時偕極故窮而變者乾元用九是也知是則繼如有終而有始其序不可違也當不識不知以順之故曰乃見天則也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也元者萬物之所流形是則物始而亨矣始之使受命亨之使流形又制之以利貞之性情焉則乾之造乾既是矣此為以美利利天下也性貞而情利二者交相養情不利則性亦不貞性不貞則情亦失其故以利對情而言地之於萬物生載其形而已天之於萬物生翼其性情而已受命賦形而賦之性情則乾之所以兼此其利所以為大不可名言也剛健中正純粹精此乾之德也以其剛也故為玉為金以其健也故為良馬為老馬為駮馬隂陽之交為沖氣則其中也隂陽之辨有定位則其正也兩物不雜為純一物之雜為駮不純不駮則精天一物也其道有隂陽是以一物之雜也疑於雜而不粹也其交氣於坤是兩物之疑於雜而不純也其純而不雜粹而不交者謂其得一以清故也純而後粹粹而後精精則入神矣斯德之盛也夫天地之精與萬物之情通故其所感所久所聚而天地萬物之情同見焉爻之發揮旁通情者以天地之精與物之情本通故也乾之為乾語其德則大德咸備其下足以旁通情也其上足以御天雲行雨施則其利澤均平而無彼疆爾界此乾之所以惟天為大而孔子歎之也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也內充實而外光輝者明中而隱外也君子之德成而無虧蓋所謂充實而成者也故以為行則有光輝之德日可見之行當此之時乃亦用其光則孔子之用灼然矣非所以為潛也故當隱而未見行而未成君子亦弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也聚者積小之名君子之學也天地萬物之理古今治亂之變無不旁搜而逺取者所以聚之也聚之則聞見多矣聞而不集其善多見不識其真則徒自惑耳故問以辨之九二有學問之象者以君德而處下體有資納於物之意焉學問修性者也寬仁則其性得矣寬以居之者謂九二衍在中而無九三之憂無九四之疑上不為文武之汲汲下不為仲尼之皇皇而居有餘裕也仁以行之龍有利澤之材而田為利養之所以利澤之材而居利養之所則仁之及物深也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎九三九四皆以剛復剛是以重剛也三過四不及是以不中也其材重剛而不中則動必為非常之事矣九三上不在天下不在田而勢將至矣九四又不中勢尤迫也此九三所以懼而九四所以惑也勇者不懼於其不足懼可也如其可懼則雖聖人之大勇猶將有所懼焉九三之惕是也知者不惑於其不足惑可也如其可惑雖聖人之大知猶將惑焉九四之或是也王通曰天下皆憂吾獨不憂乎天下皆疑吾獨不疑乎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎天地隂陽之形日月隂陽之精四時隂陽之序鬼神隂陽之靈四者不離乎隂陽不離乎道夫人能體道則與天地合德日月合明四時合序鬼神合吉凶矣天地合德故無不覆幬無不持載且生育長養有大德焉鼓舞動化有妙德焉與日月合明故知彰也猶曰之昱乎晝知微也猶月之昱乎夜與四時合其序故其進退有度與鬼神合其吉凶故其賞罰無私焉九二亦大人也未足言此何也九二臣也非位之大故不足以合天地之德非宜照天下故不足以合日月之明不得兼進退故不足以合四時之序不得擅威福故不足以合鬼神之吉凶此所以獨言九五也天法道故以道先天而天弗違焉以身徇道則後天而奉天時焉天且弗違此大人之在上所以能馭也故曰况於人乎亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎進退者其時也存亡者其人也身退而其位存遂以為有得身退而其位亡遂以為有喪此人情之常也聖人乘天下之變與之俱逝而無所槩於其心是以無喪而進退存亡不失其正也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆坤之為道妻道也臣道也賢人之分也妻道不出於閫臣道不出於位賢人之分亦有宫庭壇宇以守之而不敢踰也則坤之為義蓋有方矣異乎神之無方也故乾不言所利坤則利牝馬之貞夫馬之為物視龍為順視牛為健蓋其才健至順者也臣之道不欲健勝順故利在牝馬健不勝其順者也然而健不勝順則患其柔從而無立志是以有攸往必君子而後可也君子於仁也柔於義也剛而健順兩進故也乾為馬而坤之貞亦為馬其象上同於乾故有先迷之理焉然其馬牝馬也故有後得主之道焉乾言進退存亡而不言得喪以聖人無得亦無喪故也聖人有喪故利西南得朋東北喪朋矣然以得朋為得以喪朋為喪則異乎衆人之得喪也安貞猶所謂安汝止也地無以寧將恐發故欲安貞也凡物雜乎芒芴之間必變而有氣氣變而有形形變而有生然則所以資始者資之於氣變之先所以資生者資之於形變之後此乾知大始坤作成物之意也乃順承天者自生生而繼之之為順自下而承之之為承坤之為牛者順也其為輿者承也坤厚載物德合無疆言坤之德又足以合其無疆之行猶所謂踐形者也坤有無疆之形又有無疆之德以合之此所以能持載亦所以能廣大也含者傳所謂地隱魄營者是也宏者傳所謂地載神氣者是也隱魄營則萬物之會歸載神氣則萬物之流形自含而宏則是納而後施養而後動也此其業所以光大故曰含宏光大品物流形者乾之亨是也坤則亨品物之情而已故曰品物咸亨也坤之利不在龍者龍不足乎順且非地利故也又不在牛者牛不足乎健行地無疆故也其順為地類其健足以行地無疆者非馬而何故曰牝馬地類行地無疆也柔順其易入於邪柔順而不入於邪者君子之所行也故曰柔順利貞君子攸行也以聖人而為君則天可先也亦可後也以賢人而為臣則君不可先也可後而已故曰先迷失道後順得常者則君在道臣謹法故也西南者坤方也坤之在西南則得其類行也馬與類行者猶否之初六以其彚征吉未必稱行其道也傳曰定公然後能應故必安貞然後應地無疆焉不能貞而為事則不終朝而力屈矣安能應地無疆乎傳曰其用心不勞其應物無疆與此同意象曰地勢坤君子以厚德載物地盤而向乎上勢至順也故曰地勢坤君子以厚德者所謂人法地故也水之積不厚則不能負舟風之積不厚則不能負天君子所以負天下之至重而不輸載者亦惟厚德而已初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也初六隂始凝而為霜霜則甚微而易散霜積久而為氷氷則甚堅而難泮此戒夫隂長也夫霜之與氷與秋冬又為序理必至者也小人之長而不知懲其微則勢必至亦若此而已夫乾為龍而坤之極亦為龍乾為氷而坤之究亦為氷由馴至其道耳六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也柔順則疑於不直然而六二中也中則不倚故能直順則疑於不方然六二正則不變故能方夫坤之於方也物性長非所斷短非所續甲者坼非固剖之屈者伸非固揠之是乃所以為直也火可滅而不可使之間氷可涸而不可使之炎駢者齧之則泣枝者齕之則啼是乃所以為方也直方故能大若夫生萬物而不以直成萬物而不以方則拂性而迷理焉能大哉能生萬物不私而知其直成萬物不易而知其方則是方因動而後見故曰六二之動直以方也古者深衣則負直而抱方則是君子動容不離乎直方之間矣習之後利道之常也不習無不利地道之光也未能則學已能則習先學而後習故乾言學坤言習乾聖人之分也而曰學以謂聖雖絶學有中才焉有與同也坤賢人之分也而曰不習者以謂賢雖務學有良能焉不必習也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也芾之色君則以朱臣則以赤君以含藏為道臣以布散為道也君以含藏為道故姤之九五含章可貞則有隕自天象也中正也臣以布散為道故坤之六三則曰可貞而已含章而不發則臣之分為貞矣然而正君之道為未貞也欲其以時發也或從王事者無遂事之謂也不敢執一而東西南北惟命之從是以稱也人之有智不必自照而後光大也能為而能不為乃所以為光大故不敢遂事而為光大焉無成有終則以謂君造始臣代終君臣之大分故也臣欲有成則先迷失道矣六四括囊無咎無譽象曰括囊無咎慎不害也坤之靜也翕動也闢其翕闢惟時而已六四當天地之閉是以體坤之翕而括囊焉括囊則無咎亦旡譽矣若夫括不以時則為素隱雖足以避一時之患未免乎君子之咎也雖足以要一時之譽未免乎君子之誚也烏能無咎哉六五黃裳元吉象曰黃裳元吉文在中也坤之色以黑為正以黃為美服之制上為衣下為裳色之見於外也為黃非若括囊者也位之正乎下也為裳非若龍戰者也是以元吉也文在中者即後之所謂美在中者也人者隂陽之交五行之秀氣則文固在其中矣加磨琢焉使其成章然後美在其中矣所以先文而後言美也美然後致用六以大終本諸此而已矣上六龍戰于野其血玄黃象曰龍戰于野其道窮也用六利永貞象曰用六永貞以大終也隂與陽同稱龍陽與隂同稱血則以隂盛而敵陽微而傷隂陽皆窮矣故曰其道窮也用九者非至於亢而後用九以謂用九則無是亢也用六者非至於戰而後用六以謂用六則旡是戰也蓋六者隂之中數用中而能永貞則六五之元吉不難至矣用中而不能期月守則非所謂永貞也上六之戰非一朝一夕之故其所由來者漸矣故曰非永貞不可也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行乾剛也有時乎柔然坤之為柔則至柔矣乾動也有時乎靜然坤之為靜則至靜矣故此稱至柔至靜焉坤至柔然其動也剛若氣湊於下而萬物生不可禦者是其動而剛也雖至柔而動則剛雖動而其歸則靜故言之以至靜焉前曰六二之動直方也則是動而後方可見也今曰至靜而德方然則坤之動靜皆可見矣於靜而正稱德者其性故也於動而方稱義者其行故也行以柔而動既剛而靜則其剛不失於方此所以後得主而有常含萬物而化光也蓋至柔至靜者後主之道也雖有時而剛動而終始不違乎至靜則是有常者也至柔至靜含萬物之道也雖有時乎剛動而終不違乎柔靜所以化光也若柔而不能動如疲懦動無能為之人雖足以含受於物又安能化光也哉坤以安貞為德則其行非其性然也柔承天而時行耳此坤道所以為順故曰坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也自上制下則其勢易自下制上則其勢難故必積而後至焉積而至猶萌蘖之長不見其進而忽焉而已高大矣是在辨之早也大抵善者不求人知不善者又深自闔藏而不欲人之知也則辨之于早非觀象知器者孰能與於此哉衆人之性從善如登從惡如傾小人之從惡則其順如傾非有以逆其順則其勢彌大沛然莫之能禦矣故曰履霜堅氷至蓋言順也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也直其正也言直出於其正也方其義也言方出於其義也蓋直雖善矣而有所謂直而肆其出於正則直而不肆矣方雖善也而有所謂方而礙出於義則方而不礙矣上言直其正下言敬以直內何也正言性敬言德其實一也君子敬以直內義以方外敬義兩立而德不孤是所以為大也夫事出於習則行不能無疑不習無不利則左右周旋無往而不可何疑之有哉故曰不疑其所行也隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也括囊則與天地俱閉而不發也含章非不發也特以時發而已不然則是包羞而已何足貴哉故曰弗敢成也弗敢者於分有所不敢非其才有所不能也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也通於天地者德也行於萬物者道也賢者放德而行循道而趨則其與天地萬物同流乎消息盈虛之變矣故天地變化草木蕃則賢人見天地閉草木雕則賢人隱然則賢人之隱見通乎天地應乎萬物固為謹也蓋括囊非賢人之爻以天地萬物猶然顧不得不括耳此所以有天地草木之稱也前言慎後言謹慎在心謹在行君子黃中通理正位居體美在其中而暢於四支發於事業美之至也黃中通理釋爻所謂黃也正位居體釋爻所謂裳也蓋中者是兩端之所合四旁之所會故欲通上下而無不偏通四方而無不倚者莫若中是以謂黃中通理君正位乎上則體安於上臣正位乎下則體安於下六五猶黃裳之在下此善正位以安居其體矣故曰正位居體黃者美善之見乎外也其見乎外必有諸中故曰美在其中而暢於四肢發於事業也且玉在山而木潤淵生珠而雀不枯其美在其中而暢於四肢者亦若是而已孟子所謂晬然見於面盎於背施於四體而荀子以容止不枯為君子詩以赫如渥赭為碩人蓋德之潤身固如此也暢於四肢則成已者足矣發于事業又所以成物也上以美政下以美俗此之謂發于事業發於事業非特充實於其心又充實於天下是為美之至也美在其中暢於四支而不發於事業是猶美玊而藏於垢石也孰知其美哉美之於中未見於四支而強欲發於事業則是醜人而欲效顰於西子也烏見其美哉故必美在其中而暢於四支發於事業始得為美之至也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃天之色以玄為正其盛也為赤地之色以黑為正其盛也為黃稱天玄而地黃則是陽微而隂盛也且赤與黑為玄而赤者陽之盛也黑者隂之正色兩者合而為玄玄為天之正色則陽得兼隂在陽宜盛隂宜微也天玄而地黃義見於是也周易新講義卷一
